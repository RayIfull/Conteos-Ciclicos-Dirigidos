<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Conteo Cruzado</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #12151E; font-family: 'Courier New', Courier, monospace; color: #F0F0F0; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    // ─── FIREBASE ────────────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyCwiWFATCtNa-IdsUSXey9-OVj9cD2okfA",
      authDomain: "conteos-ciclicos-dirigidos.firebaseapp.com",
      databaseURL: "https://conteos-ciclicos-dirigidos-default-rtdb.firebaseio.com",
      projectId: "conteos-ciclicos-dirigidos",
      storageBucket: "conteos-ciclicos-dirigidos.firebasestorage.app",
      messagingSenderId: "1075522216092",
      appId: "1:1075522216092:web:02c3c1c5763b89d3b40d59"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const fbGet  = (path) => db.ref(path || "/").get().then(s => s.val()).catch(() => null);
    const fbSet  = (path, data) => db.ref(path).set(data).catch(console.error);
    const fbPush = (path, data) => db.ref(path).push(data).catch(console.error);
    const fbDel  = (path) => db.ref(path).remove().catch(console.error);
    const fbOn = (path, cb) => { const ref = db.ref(path || "/"); const h = s => { try { cb(s.val() || {}); } catch(e) { console.error(e); } }; ref.on("value", h, e => console.error(e)); return () => ref.off("value", h); };

    // ─── CLIENTES ─────────────────────────────────────────────────────────────
    const CLIENTES = {
      PAPAISON: {
        nombre: "Papaison", color: "#00E6A8", dark: "#0A2E22", tipo: "Rack",
        ubicacionPlaceholder: "Ej: B/13/N2", ubicacionHint: "Formato: LETRA / POSICIÓN / NIVEL",
        ubicacionRegex: /^[A-Ua-u]\/\d{1,2}\/N[1-6]$/i,
        skuPlaceholder: "SKU + cód. barras (Ej: PAP-001)",
      },
      HUDSON: {
        nombre: "Hudson", color: "#FF7A45", dark: "#2E1206", tipo: "Suelo",
        ubicacionPlaceholder: "Ej: SUELO-Z1", ubicacionHint: "Zona o referencia de suelo",
        ubicacionRegex: null, skuPlaceholder: "SKU alfabético (Ej: HUD-ABC-001)",
      },
    };

    const SUPERVISOR_PIN = "1234";
    const ts  = () => new Date().toLocaleTimeString("es-MX", { hour: "2-digit", minute: "2-digit" });
    const uid = () => Math.random().toString(36).slice(2, 9);

    // ─── CROSS MAP ────────────────────────────────────────────────────────────
    function buildCrossMap(registros, validaciones) {
      const map = {};
      ["E1", "E2"].forEach(eq => {
        const regs = registros?.[eq] ? Object.values(registros[eq]) : [];
        regs.forEach(reg => {
          (reg.skus || []).forEach(s => {
            const key = `${reg.ubicacion}__${s.sku.toUpperCase()}`;
            if (!map[key]) map[key] = { ubicacion: reg.ubicacion, sku: s.sku.toUpperCase(), E1: null, E2: null };
            map[key][eq] = s.cantidad;
          });
        });
      });
      const vals = validaciones || {};
      Object.keys(map).forEach(k => { map[k].validado = vals[k] !== undefined ? vals[k] : null; });
      return Object.values(map).sort((a, b) => a.ubicacion.localeCompare(b.ubicacion) || a.sku.localeCompare(b.sku));
    }

    function getStatus(row) {
      if (row.validado !== null && row.validado !== undefined) return "validado";
      if (row.E1 === null || row.E2 === null) return "incompleto";
      return row.E1 === row.E2 ? "ok" : "discrepancia";
    }

    const STATUS_CFG = {
      ok:           { label: "✓ Coincide",     color: "#00E6A8", bg: "#00E6A820" },
      discrepancia: { label: "⚠ Discrepancia", color: "#FF5555", bg: "#FF555520" },
      incompleto:   { label: "◌ Incompleto",   color: "#D0D4E8", bg: "#D0D4E810" },
      validado:     { label: "✓✓ Validado",    color: "#C8AEFF", bg: "#C8AEFF20" },
    };

    const Badge = ({ status }) => {
      const c = STATUS_CFG[status];
      return <span style={{ fontSize: 12, fontWeight: 800, color: c.color, border: `2px solid ${c.color}`,
        borderRadius: 6, padding: "4px 10px", background: c.bg, whiteSpace: "nowrap" }}>{c.label}</span>;
    };

    function ConfirmModal({ title, message, confirmLabel, confirmColor, onConfirm, onCancel }) {
      return (
        <div style={{ position: "fixed", inset: 0, background: "#000000DD", zIndex: 300,
          display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div style={{ background: "#1C2030", border: `3px solid ${confirmColor || "#FF5555"}`,
            borderRadius: 18, padding: "32px 24px", maxWidth: 340, width: "100%", textAlign: "center" }}>
            <div style={{ fontSize: 44, marginBottom: 12 }}>⚠️</div>
            <p style={{ color: "#FFFFFF", fontSize: 19, fontWeight: 900, marginBottom: 10 }}>{title}</p>
            <p style={{ color: "#C0C4D8", fontSize: 14, marginBottom: 28, lineHeight: 1.7 }}>{message}</p>
            <div style={{ display: "flex", gap: 12 }}>
              <button style={{ flex: 1, background: "#2A2D3A", border: "2px solid #8A8FA8",
                color: "#FFFFFF", borderRadius: 12, padding: "15px", fontSize: 15, fontWeight: 800,
                cursor: "pointer", fontFamily: "inherit" }} onClick={onCancel}>Cancelar</button>
              <button style={{ flex: 1, background: confirmColor || "#FF5555", border: "none",
                color: "#FFFFFF", borderRadius: 12, padding: "15px", fontSize: 15, fontWeight: 800,
                cursor: "pointer", fontFamily: "inherit" }} onClick={onConfirm}>{confirmLabel}</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── ESTILOS ──────────────────────────────────────────────────────────────
    const S = {
      root: { minHeight: "100vh", background: "#12151E", color: "#F0F0F0", fontFamily: "'Courier New', Courier, monospace", paddingBottom: 40 },
      center: { minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#12151E" },
      homeHeader: { padding: "36px 24px 24px", textAlign: "center", borderBottom: "2px solid #3A3D4A" },
      logo: { fontSize: 42, color: "#C8AEFF", marginBottom: 10 },
      homeTitle: { fontSize: 30, fontWeight: 900, letterSpacing: 4, margin: "0 0 10px", color: "#FFFFFF" },
      homeSub: { color: "#C0C4D8", fontSize: 14, letterSpacing: 2, margin: 0, fontWeight: 600 },
      sectionLabel: { fontSize: 13, letterSpacing: 3, color: "#C0C4D8", textTransform: "uppercase", marginBottom: 14, fontWeight: 800, display: "block" },
      clienteGrid: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 8 },
      clienteBtn: { border: "2px solid", borderRadius: 14, padding: "22px 16px", display: "flex", flexDirection: "column", gap: 8, cursor: "pointer" },
      clienteActivo: { border: "2px solid", borderRadius: 12, padding: "16px 18px", display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 },
      cambiarBtn: { background: "#2A2D3A", border: "2px solid #8A8FA8", color: "#FFFFFF", borderRadius: 10, padding: "12px 18px", fontSize: 15, fontWeight: 800, cursor: "pointer", fontFamily: "inherit" },
      modeGrid: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 16 },
      modeBtn: { borderRadius: 14, padding: "24px 10px", display: "flex", flexDirection: "column", alignItems: "center", cursor: "pointer", fontFamily: "inherit", gap: 6 },
      modeBtnActive: { background: "#1C2030", border: "2px solid #6A6F82" },
      modeBtnDisabled: { background: "#161820", border: "2px solid #1E2028", cursor: "default" },
      supBtn: { width: "100%", background: "#1E1A30", border: "2px solid #8A6FCC", borderRadius: 14, color: "#E0CCFF", fontFamily: "inherit", fontSize: 18, fontWeight: 900, padding: "18px", cursor: "pointer", letterSpacing: 1 },
      nav: { display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", borderBottom: "3px solid" },
      navBtn: { background: "#2A2D3A", border: "2px solid #8A8FA8", color: "#FFFFFF", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontWeight: 800, cursor: "pointer", fontFamily: "inherit" },
      resetBtn: { background: "#2A1515", border: "2px solid #FF5555", color: "#FF5555", borderRadius: 8, padding: "10px 14px", fontSize: 14, fontWeight: 800, cursor: "pointer", fontFamily: "inherit" },
      card: { background: "#1C2030", border: "2px solid #3A3D4A", borderRadius: 14, padding: "20px 16px" },
      label: { fontSize: 13, letterSpacing: 2, color: "#D0D4E8", textTransform: "uppercase", display: "block", marginBottom: 8, fontWeight: 800 },
      hint: { fontSize: 13, color: "#A0A4B8", marginTop: 6, display: "block", fontWeight: 600 },
      input: { background: "#0E1016", border: "2px solid #4A4D5A", borderRadius: 9, color: "#FFFFFF", fontFamily: "'Courier New', monospace", fontSize: 16, padding: "13px 14px", outline: "none", width: "100%", boxSizing: "border-box" },
      inputErr: { borderColor: "#FF5555" },
      errMsg: { color: "#FF5555", fontSize: 13, marginTop: 5, display: "block", fontWeight: 800 },
      solidBtn: { border: "none", borderRadius: 12, padding: "16px", fontSize: 16, fontWeight: 900, letterSpacing: 1, cursor: "pointer", fontFamily: "inherit", width: "100%", display: "block" },
      textBtn: { background: "none", border: "none", color: "#C0C4D8", cursor: "pointer", fontFamily: "inherit", fontSize: 15, display: "block", textAlign: "center", marginTop: 14, width: "100%", padding: 10, fontWeight: 700 },
      pinCard: { background: "#1C2030", border: "2px solid #4A4D5A", borderRadius: 18, padding: "36px 28px", width: "320px" },
    };

    // ─── APP ─────────────────────────────────────────────────────────────────
    function App() {
      const [mode, setMode] = React.useState(null);
      const [pin, setPin] = React.useState("");
      const [pinError, setPinError] = React.useState(false);
      const [clienteKey, setClienteKey] = React.useState(null);
      const [confirmReset, setConfirmReset] = React.useState(false);
      const [fbReady, setFbReady] = React.useState(false);

      React.useEffect(() => {
        fbGet("sesion/cliente").then(k => { if (k) setClienteKey(k); setFbReady(true); }).catch(() => setFbReady(true));
      }, []);

      const handleSetCliente = async (key) => { await fbSet("sesion/cliente", key); setClienteKey(key); };
      const handleReset = async () => {
        await fbDel("registros"); await fbDel("validaciones"); await fbSet("sesion/cliente", null);
        setClienteKey(null); setMode(null); setConfirmReset(false);
      };

      if (!fbReady) return (
        <div style={S.center}>
          <span style={{ color: "#C0C4D8", letterSpacing: 4, fontSize: 15, fontWeight: 700 }}>CONECTANDO...</span>
        </div>
      );

      if (!mode) return (
        <div style={S.root}>
          {confirmReset && (
            <ConfirmModal title="¿Reiniciar conteo?"
              message={<span>Se borrarán <strong style={{color:"#fff"}}>todos los registros</strong> de ambos equipos.<br/><strong style={{color:"#FF5555"}}>Esta acción no se puede deshacer.</strong></span>}
              confirmLabel="Sí, reiniciar" confirmColor="#FF5555"
              onConfirm={handleReset} onCancel={() => setConfirmReset(false)} />
          )}
          <div style={S.homeHeader}>
            <div style={S.logo}>◈</div>
            <h1 style={S.homeTitle}>CONTEO CRUZADO</h1>
            <p style={S.homeSub}>Sistema de inventario con verificación</p>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 6, marginTop: 10,
              background: "#00E6A820", border: "1px solid #00E6A8", borderRadius: 20, padding: "4px 14px" }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: "#00E6A8", display: "inline-block" }} />
              <span style={{ color: "#00E6A8", fontSize: 11, fontWeight: 700, letterSpacing: 1 }}>EN LÍNEA · FIREBASE</span>
            </div>
          </div>

          <div style={{ padding: "20px" }}>
            {!clienteKey ? (
              <>
                <span style={S.sectionLabel}>Selecciona cliente</span>
                <div style={S.clienteGrid}>
                  {Object.entries(CLIENTES).map(([k, c]) => (
                    <button key={k} style={{ ...S.clienteBtn, borderColor: c.color, background: c.dark }}
                      onClick={() => handleSetCliente(k)}>
                      <span style={{ color: c.color, fontWeight: 900, fontSize: 22 }}>{c.nombre}</span>
                      <span style={{ color: "#E0E4F8", fontSize: 15, fontWeight: 600 }}>{c.tipo}</span>
                    </button>
                  ))}
                </div>
              </>
            ) : (
              <>
                <span style={S.sectionLabel}>Cliente activo</span>
                <div style={{ ...S.clienteActivo, borderColor: CLIENTES[clienteKey].color, background: CLIENTES[clienteKey].dark }}>
                  <div>
                    <div style={{ color: CLIENTES[clienteKey].color, fontWeight: 900, fontSize: 22 }}>{CLIENTES[clienteKey].nombre}</div>
                    <div style={{ color: "#D0D4E8", fontSize: 14, marginTop: 2, fontWeight: 600 }}>{CLIENTES[clienteKey].tipo}</div>
                  </div>
                  <button style={S.cambiarBtn} onClick={() => handleSetCliente(null)}>Cambiar</button>
                </div>
              </>
            )}

            <span style={{ ...S.sectionLabel, marginTop: 24 }}>¿Quién eres?</span>
            <div style={S.modeGrid}>
              {["E1", "E2"].map(e => {
                const activo = !!clienteKey;
                return (
                  <button key={e} style={{ ...S.modeBtn, ...(activo ? S.modeBtnActive : S.modeBtnDisabled) }}
                    onClick={() => activo && setMode(e)} disabled={!activo}>
                    <span style={{ fontSize: 32, fontWeight: 900, color: activo ? "#FFFFFF" : "#4A4D5A", letterSpacing: 2 }}>EQ {e[1]}</span>
                    <span style={{ fontSize: 15, color: activo ? "#D0D4E8" : "#3A3D4A", fontWeight: 700, marginTop: 4 }}>Contador</span>
                  </button>
                );
              })}
            </div>
            <button style={S.supBtn} onClick={() => setMode("pin")}>🔐 Acceso Supervisor</button>
            {!clienteKey && <p style={{ color: "#FF9955", fontSize: 14, textAlign: "center", marginTop: 16, fontWeight: 700 }}>← Selecciona un cliente para habilitar los equipos</p>}
          </div>
        </div>
      );

      if (mode === "pin") return (
        <div style={S.center}>
          <div style={S.pinCard}>
            <div style={{ fontSize: 36, marginBottom: 10, textAlign: "center" }}>🔐</div>
            <p style={{ color: "#FFFFFF", letterSpacing: 2, fontSize: 16, fontWeight: 800, textAlign: "center", marginBottom: 20 }}>PIN SUPERVISOR</p>
            <input style={{ ...S.input, textAlign: "center", fontSize: 28, fontWeight: 900, letterSpacing: 10 }}
              type="password" inputMode="numeric" maxLength={4} value={pin}
              onChange={e => { setPin(e.target.value); setPinError(false); }}
              placeholder="••••"
              onKeyDown={e => { if (e.key === "Enter") { if (pin === SUPERVISOR_PIN) { setMode("supervisor"); setPin(""); } else { setPinError(true); setPin(""); } } }}
            />
            {pinError && <p style={{ color: "#FF5555", fontSize: 14, fontWeight: 800, textAlign: "center", marginTop: 10 }}>PIN incorrecto</p>}
            <button style={{ ...S.solidBtn, background: "#C8AEFF", color: "#0A0820", marginTop: 18 }}
              onClick={() => { if (pin === SUPERVISOR_PIN) { setMode("supervisor"); setPin(""); } else { setPinError(true); setPin(""); } }}>Entrar</button>
            <button style={S.textBtn} onClick={() => setMode(null)}>← Volver</button>
          </div>
        </div>
      );

      if (mode === "E1" || mode === "E2") return <ContadorView equipo={mode} clienteKey={clienteKey} onBack={() => setMode(null)} />;
      if (mode === "supervisor") return <SupervisorView clienteKey={clienteKey} onBack={() => setMode(null)} onReset={() => setConfirmReset(true)} />;
    }

    // ─── CONTADOR ─────────────────────────────────────────────────────────────
    function ContadorView({ equipo, clienteKey, onBack }) {
      const cliente = CLIENTES[clienteKey] || CLIENTES.PAPAISON;
      const [ubicacion, setUbicacion] = React.useState("");
      const [skus, setSkus] = React.useState([{ id: uid(), sku: "", cantidad: "" }]);
      const [nota, setNota] = React.useState("");
      const [errors, setErrors] = React.useState({});
      const [saved, setSaved] = React.useState(false);
      const [saving, setSaving] = React.useState(false);
      const [totalRegistros, setTotalRegistros] = React.useState(0);
      const [lastReg, setLastReg] = React.useState(null);

      React.useEffect(() => {
        const off = fbOn(`registros/${equipo}`, data => {
          const regs = data ? Object.values(data) : [];
          setTotalRegistros(regs.length);
          if (regs.length > 0) setLastReg(regs.sort((a, b) => (b.ts||0) - (a.ts||0))[0]);
        });
        return off;
      }, [equipo]);

      const addSku = () => setSkus(s => [...s, { id: uid(), sku: "", cantidad: "" }]);
      const removeSku = (id) => setSkus(s => s.filter(x => x.id !== id));
      const updateSku = (id, field, val) => setSkus(s => s.map(x => x.id === id ? { ...x, [field]: val } : x));

      const validate = () => {
        const e = {};
        if (!ubicacion.trim()) e.ubicacion = "Requerida";
        else if (cliente.ubicacionRegex && !cliente.ubicacionRegex.test(ubicacion.trim())) e.ubicacion = "Formato incorrecto — usa LETRA/POSICIÓN/NIVEL";
        skus.forEach((s, i) => {
          if (!s.sku.trim()) e[`sku_${i}`] = "SKU requerido";
          if (s.cantidad === "" || isNaN(s.cantidad) || Number(s.cantidad) < 0) e[`cant_${i}`] = "Cantidad inválida";
        });
        return e;
      };

      const handleGuardar = async () => {
        const e = validate(); if (Object.keys(e).length) { setErrors(e); return; }
        setSaving(true);
        await fbPush(`registros/${equipo}`, {
          ubicacion: ubicacion.trim().toUpperCase(),
          skus: skus.map(s => ({ sku: s.sku.trim().toUpperCase(), cantidad: Number(s.cantidad) })),
          nota: nota.trim(), hora: ts(), ts: Date.now(),
        });
        setSaving(false);
        setUbicacion(""); setSkus([{ id: uid(), sku: "", cantidad: "" }]); setNota(""); setErrors({});
        setSaved(true); setTimeout(() => setSaved(false), 2000);
      };

      return (
        <div style={S.root}>
          <div style={{ ...S.nav, borderColor: cliente.color }}>
            <button style={S.navBtn} onClick={onBack}>← Salir</button>
            <div style={{ flex: 1 }}>
              <div style={{ color: cliente.color, fontWeight: 900, fontSize: 16, letterSpacing: 2 }}>EQUIPO {equipo[1]}</div>
              <div style={{ color: "#D0D4E8", fontSize: 13, fontWeight: 600 }}>{cliente.nombre}</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ color: "#FFFFFF", fontWeight: 900, fontSize: 22 }}>{totalRegistros}</div>
              <div style={{ color: "#C0C4D8", fontSize: 12, fontWeight: 600 }}>posiciones</div>
            </div>
          </div>

          <div style={{ padding: "16px" }}>
            <div style={S.card}>
              <label style={S.label}>{cliente.tipo === "Rack" ? "Ubicación de rack" : "Zona / Referencia"}</label>
              <input style={{ ...S.input, ...(errors.ubicacion ? S.inputErr : {}) }}
                placeholder={cliente.ubicacionPlaceholder} value={ubicacion}
                onChange={e => { setUbicacion(e.target.value); setErrors(er => ({ ...er, ubicacion: null })); }} />
              <span style={S.hint}>{cliente.ubicacionHint}</span>
              {errors.ubicacion && <span style={S.errMsg}>{errors.ubicacion}</span>}

              <div style={{ marginTop: 22, marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <label style={{ ...S.label, margin: 0 }}>SKUs en esta posición</label>
                <button style={{ background: cliente.color, border: "none", color: "#000", borderRadius: 8, padding: "10px 18px", fontSize: 15, fontWeight: 900, cursor: "pointer", fontFamily: "inherit" }} onClick={addSku}>+ Agregar SKU</button>
              </div>

              {skus.map((s, i) => (
                <div key={s.id} style={{ display: "flex", gap: 8, marginBottom: 14, alignItems: "flex-start" }}>
                  <div style={{ flex: 2 }}>
                    <div style={{ color: "#D0D4E8", fontSize: 13, fontWeight: 700, marginBottom: 6 }}>SKU {i + 1}</div>
                    <input style={{ ...S.input, ...(errors[`sku_${i}`] ? S.inputErr : {}) }}
                      placeholder={cliente.skuPlaceholder} value={s.sku}
                      onChange={e => { updateSku(s.id, "sku", e.target.value); setErrors(er => ({ ...er, [`sku_${i}`]: null })); }} />
                    {errors[`sku_${i}`] && <span style={S.errMsg}>{errors[`sku_${i}`]}</span>}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ color: "#D0D4E8", fontSize: 13, fontWeight: 700, marginBottom: 6 }}>Cant.</div>
                    <input style={{ ...S.input, textAlign: "center", fontSize: 26, fontWeight: 900, ...(errors[`cant_${i}`] ? S.inputErr : {}) }}
                      placeholder="0" type="number" inputMode="numeric" min="0" value={s.cantidad}
                      onChange={e => { updateSku(s.id, "cantidad", e.target.value); setErrors(er => ({ ...er, [`cant_${i}`]: null })); }}
                      onKeyDown={e => e.key === "Enter" && handleGuardar()} />
                    {errors[`cant_${i}`] && <span style={S.errMsg}>{errors[`cant_${i}`]}</span>}
                  </div>
                  {skus.length > 1 && (
                    <button style={{ background: "#2A1515", border: "2px solid #FF5555", color: "#FF5555", borderRadius: 8, padding: "10px 12px", fontSize: 16, cursor: "pointer", fontFamily: "inherit", alignSelf: "flex-end", marginBottom: 2 }}
                      onClick={() => removeSku(s.id)}>✕</button>
                  )}
                </div>
              ))}

              <label style={{ ...S.label, marginTop: 10 }}>Nota (daño, observación)</label>
              <input style={S.input} placeholder="Opcional — daño, discrepancia física, etc."
                value={nota} onChange={e => setNota(e.target.value)}
                onKeyDown={e => e.key === "Enter" && handleGuardar()} />

              <button style={{ ...S.solidBtn, background: saved ? "#00E6A8" : cliente.color, color: "#000", marginTop: 22, fontSize: 17, opacity: saving ? 0.7 : 1 }}
                onClick={handleGuardar} disabled={saving}>
                {saving ? "Guardando..." : saved ? "✓ Posición guardada" : "Registrar posición"}
              </button>
            </div>

            {lastReg && (
              <div style={{ background: "#1C2030", border: `2px solid ${cliente.color}88`, borderRadius: 12, padding: "14px 16px", marginTop: 14 }}>
                <div style={{ color: "#C0C4D8", fontSize: 12, fontWeight: 700, letterSpacing: 2, marginBottom: 8 }}>ÚLTIMO REGISTRO — {lastReg.hora}</div>
                <div style={{ color: cliente.color, fontWeight: 900, fontSize: 17 }}>{lastReg.ubicacion}</div>
                {(lastReg.skus || []).map((s, i) => (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", marginTop: 7 }}>
                    <span style={{ color: "#E0E4F8", fontSize: 14, fontWeight: 600 }}>{s.sku}</span>
                    <span style={{ color: "#FFFFFF", fontWeight: 900, fontSize: 16 }}>{s.cantidad} uds</span>
                  </div>
                ))}
              </div>
            )}
            <p style={{ color: "#A0A4B8", fontSize: 13, textAlign: "center", marginTop: 16, fontWeight: 600 }}>Registros visibles para el supervisor en tiempo real</p>
          </div>
        </div>
      );
    }

    // ─── SUPERVISOR ───────────────────────────────────────────────────────────
    function SupervisorView({ clienteKey, onBack, onReset }) {
      const cliente = clienteKey ? CLIENTES[clienteKey] : null;
      const accentColor = cliente?.color || "#C8AEFF";
      const [fbData, setFbData] = React.useState({});
      const [terceros, setTerceros] = React.useState({});
      const [filter, setFilter] = React.useState("all");
      const [saving, setSaving] = React.useState({});
      const [showCopyModal, setShowCopyModal] = React.useState(false);
      const [copied, setCopied] = React.useState(false);

      React.useEffect(() => {
        const off = fbOn("/", data => setFbData(data || {}));
        return off;
      }, []);

      const cross = buildCrossMap(fbData.registros, fbData.validaciones);
      const counts = cross.reduce((acc, r) => { const s = getStatus(r); acc[s] = (acc[s]||0)+1; return acc; }, {});
      const filtered = filter === "all" ? cross : cross.filter(r => getStatus(r) === filter);

      const handleValidar = async (key, cantidad) => {
        setSaving(s => ({ ...s, [key]: true }));
        const fbKey = key.replace(/[.#$[\]/]/g, "_");
        await fbSet(`validaciones/${fbKey}`, Number(cantidad));
        setSaving(s => ({ ...s, [key]: false }));
      };

      const buildCSVText = () => {
        if (!cross.length) return "";
        const header = "Ubicacion,SKU,Equipo1,Equipo2,Validado,Estatus";
        const body = cross.map(r => `${r.ubicacion},${r.sku},${r.E1??""},${r.E2??""},${r.validado??""},${getStatus(r)}`);
        return [header, ...body].join("\n");
      };

      const exportCSV = () => {
        if (!cross.length) return;
        const blob = new Blob([buildCSVText()], { type: "text/csv" });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
        a.download = `conteo_cruzado_${clienteKey||"general"}_${new Date().toISOString().slice(0,10)}.csv`; a.click();
      };

      const handleCopy = () => {
        const text = buildCSVText(); if (!text) return;
        if (navigator.clipboard) { navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2500); }); }
        else { const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); setCopied(true); setTimeout(() => setCopied(false), 2500); }
      };

      const statBtns = [
        { k: "all", label: "Total", val: cross.length, color: "#D0D4E8" },
        { k: "ok", label: "✓ OK", val: counts.ok||0, color: "#00E6A8" },
        { k: "discrepancia", label: "⚠ Disc.", val: counts.discrepancia||0, color: "#FF5555" },
        { k: "incompleto", label: "◌ Inc.", val: counts.incompleto||0, color: "#D0D4E8" },
        { k: "validado", label: "✓✓ Val.", val: counts.validado||0, color: "#C8AEFF" },
      ];

      return (
        <div style={S.root}>
          {showCopyModal && (
            <div style={{ position: "fixed", inset: 0, background: "#000000DD", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
              <div style={{ background: "#1C2030", border: "2px solid #4A4D5A", borderRadius: 18, padding: "28px 20px", width: "100%", maxWidth: 480 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <p style={{ color: "#FFFFFF", fontSize: 16, fontWeight: 800 }}>Contenido CSV</p>
                  <button style={{ background: "#2A2D3A", border: "2px solid #6A6F82", color: "#FFFFFF", borderRadius: 8, padding: "8px 14px", fontSize: 13, fontWeight: 800, cursor: "pointer", fontFamily: "inherit" }} onClick={() => setShowCopyModal(false)}>✕ Cerrar</button>
                </div>
                <p style={{ color: "#A0A4B8", fontSize: 13, marginBottom: 12, fontWeight: 600 }}>Pulsa "Copiar todo" o selecciona el texto y pégalo en Excel</p>
                <textarea readOnly style={{ ...S.input, height: 200, resize: "none", fontSize: 12, lineHeight: 1.6, fontFamily: "monospace" }} value={buildCSVText()} onFocus={e => e.target.select()} />
                <button style={{ ...S.solidBtn, background: copied ? "#00E6A8" : accentColor, color: "#000", marginTop: 14, fontSize: 16 }} onClick={handleCopy}>
                  {copied ? "✓ Copiado al portapapeles" : "📋 Copiar todo"}
                </button>
              </div>
            </div>
          )}

          <div style={{ ...S.nav, borderColor: accentColor }}>
            <button style={S.navBtn} onClick={onBack}>← Salir</button>
            <div style={{ flex: 1 }}>
              <div style={{ color: accentColor, fontWeight: 900, fontSize: 16, letterSpacing: 2 }}>SUPERVISOR</div>
              <div style={{ color: "#D0D4E8", fontSize: 13, fontWeight: 600 }}>{cliente?.nombre || "Sin cliente"} · en vivo ●</div>
            </div>
            <button style={S.resetBtn} onClick={onReset}>↺ Reiniciar</button>
          </div>

          <div style={{ display: "flex", gap: 8, padding: "14px 16px", overflowX: "auto" }}>
            {statBtns.map(s => (
              <button key={s.k} onClick={() => setFilter(s.k)}
                style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
                  border: `2px solid ${filter===s.k ? s.color : "#4A4D5A"}`, borderRadius: 12,
                  padding: "12px 14px", cursor: "pointer", fontFamily: "inherit",
                  background: filter===s.k ? s.color+"22" : "#1C2030", minWidth: 68, flexShrink: 0 }}>
                <span style={{ fontSize: 26, fontWeight: 900, color: s.color }}>{s.val}</span>
                <span style={{ fontSize: 11, color: filter===s.k ? s.color : "#C0C4D8", fontWeight: 800 }}>{s.label}</span>
              </button>
            ))}
          </div>

          <div style={{ padding: "0 16px 14px", display: "flex", gap: 10 }}>
            <button style={{ ...S.solidBtn, background: accentColor, color: "#000", fontSize: 15 }} onClick={exportCSV}>↓ Descargar CSV</button>
            <button style={{ ...S.solidBtn, background: "#2A2D3A", border: "2px solid #6A6F82", color: "#FFFFFF", fontSize: 15 }} onClick={() => setShowCopyModal(true)}>📋 Copiar CSV</button>
          </div>

          <div style={{ padding: "0 16px 60px", display: "flex", flexDirection: "column", gap: 14 }}>
            {filtered.length === 0 && <p style={{ color: "#A0A4B8", textAlign: "center", marginTop: 48, fontSize: 16, fontWeight: 600 }}>Sin registros aún</p>}
            {filtered.map(row => {
              const key = `${row.ubicacion}__${row.sku}`;
              const status = getStatus(row);
              const sc = STATUS_CFG[status];
              return (
                <div key={key} style={{ background: "#1C2030", border: `2px solid ${sc.color}`, borderRadius: 16, padding: "16px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12, gap: 8 }}>
                    <div>
                      <div style={{ color: accentColor, fontWeight: 900, fontSize: 18, letterSpacing: 1 }}>{row.ubicacion}</div>
                      <div style={{ color: "#E0E4F8", fontSize: 15, fontWeight: 700, marginTop: 3 }}>{row.sku}</div>
                    </div>
                    <Badge status={status} />
                  </div>
                  <div style={{ display: "flex", gap: 10, alignItems: "stretch" }}>
                    {[["E1","EQUIPO 1",row.E1],["E2","EQUIPO 2",row.E2]].map(([eq,lbl,val]) => (
                      <div key={eq} style={{ flex:1, background:"#0E1016", border:`2px solid ${val!==null?"#4A4D5A":"#2A2D3A"}`, borderRadius:12, padding:"12px 8px", textAlign:"center" }}>
                        <div style={{ fontSize:12, color:"#C0C4D8", letterSpacing:2, fontWeight:800, marginBottom:8 }}>{lbl}</div>
                        <div style={{ fontSize:34, fontWeight:900, color:val!==null?"#FFFFFF":"#4A4D5A" }}>{val??"—"}</div>
                      </div>
                    ))}
                    {row.validado !== null && row.validado !== undefined && (
                      <>
                        <div style={{ color:"#8A8FA8", fontSize:24, alignSelf:"center", fontWeight:900 }}>→</div>
                        <div style={{ flex:1, background:"#C8AEFF18", border:"2px solid #C8AEFF", borderRadius:12, padding:"12px 8px", textAlign:"center" }}>
                          <div style={{ fontSize:12, color:"#C8AEFF", letterSpacing:2, fontWeight:800, marginBottom:8 }}>VALIDADO</div>
                          <div style={{ fontSize:34, fontWeight:900, color:"#C8AEFF" }}>{row.validado}</div>
                        </div>
                      </>
                    )}
                  </div>
                  {status === "discrepancia" && row.validado === null && (
                    <div style={{ marginTop:14, background:"#200F0F", border:"2px solid #FF5555", borderRadius:12, padding:"14px" }}>
                      <p style={{ color:"#FF5555", fontSize:15, fontWeight:800, marginBottom:12 }}>⚠ Requiere 3er conteo — ingresa la cantidad verificada:</p>
                      <div style={{ display:"flex", gap:10 }}>
                        <input style={{ ...S.input, flex:1, textAlign:"center", fontSize:28, fontWeight:900 }}
                          type="number" inputMode="numeric" min="0" placeholder="?"
                          value={terceros[key]??""} onChange={e => setTerceros(t => ({ ...t, [key]: e.target.value }))} />
                        <button style={{ background:"#FF5555", border:"none", color:"#FFFFFF", borderRadius:10, padding:"0 20px", fontSize:16, fontWeight:900, cursor:"pointer", fontFamily:"inherit", minWidth:90 }}
                          onClick={() => { if (terceros[key]!=null && terceros[key]!=="") handleValidar(key, terceros[key]); }}>
                          {saving[key] ? "..." : "✓ OK"}
                        </button>
                      </div>
                    </div>
                  )}
                  {status === "ok" && row.validado === null && (
                    <button style={{ marginTop:12, background:"#00E6A820", border:"2px solid #00E6A8", color:"#00E6A8", borderRadius:10, padding:"14px", fontSize:15, fontWeight:800, cursor:"pointer", fontFamily:"inherit", width:"100%", letterSpacing:1 }}
                      onClick={() => handleValidar(key, row.E1)}>
                      {saving[key] ? "Guardando..." : "✓ Confirmar cantidad"}
                    </button>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    try {
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    } catch(e) {
      console.error("Render error:", e);
      document.getElementById("root").innerHTML = '<div style="padding:40px;color:#FF5555;font-family:monospace;text-align:center"><p style="font-size:18px;font-weight:800">⚠ Error al cargar la app</p><p style="margin-top:10px;color:#aaa;font-size:13px">Revisa la consola del navegador (F12)</p><button onclick="location.reload()" style="margin-top:20px;padding:14px 28px;background:#C8AEFF;border:none;border-radius:10px;font-size:16px;cursor:pointer;font-weight:800">Reintentar</button></div>';
    }
  </script>
</body>
</html>
