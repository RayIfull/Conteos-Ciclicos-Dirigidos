const fbOn   = (p,cb) => {

};

// ── CROSS MAP ─────────────────────────────────────────────────────────────────
function buildCrossMap(equipos, registros, validaciones) {
  const map = {};
  const eqIds = Object.keys(equipos||{});
  eqIds.forEach(eqId => {
    const regsObj = registros?.[eqId]||{};
    Object.entries(regsObj).forEach(([fbId,reg]) => {
      (reg.skus||[]).forEach(s => {
        const key = makeKey(reg.ubicacion, s.sku);
        if (!map[key]) map[key] = { ubicacion:reg.ubicacion, sku:s.sku.toUpperCase(), validado:null, equipos:{} };
        map[key].equipos[eqId] = { cantidad:s.cantidad, fbId, nota:reg.nota||"", duracionMins:reg.duracionMins||null, totalPiezas:reg.totalPiezas||null };
      });
    });
  });
  const vals = validaciones||{};
  Object.keys(map).forEach(k => { map[k].validado = vals[k]!==undefined ? vals[k] : null; });
  return Object.values(map).sort((a,b)=>a.ubicacion.localeCompare(b.ubicacion)||a.sku.localeCompare(b.sku));
}

function getStatus(row, eqIds) {
  if (row.validado!==null && row.validado!==undefined) return "validado";
  const counts = eqIds.map(id=>row.equipos[id]?.cantidad??null).filter(v=>v!==null);
  if (counts.length < eqIds.length) return "incompleto";
  return counts.every(v=>v===counts[0]) ? "ok" : "discrepancia";
}

        if(eqs) setEquipos(eqs);
      }
      setFbReady(true);
    }).catch(()=>setFbReady(true));

  React.useEffect(()=>{

    const off = fbOn(eqPath(clienteKey), data=>setEquipos(data||{}));
    return off;
  },[clienteKey]);

  const handleSetCliente = async (key) => {

      setEquipos(eqs||{});

    const [snap, eqs] = await Promise.all([
      fbGet("/"),
      clienteKey ? fbGet(eqPath(clienteKey)) : Promise.resolve({})

    if (snap) {
      const safeEqs = eqs||{};
      const cross = buildCrossMap(safeEqs, snap.registros||{}, snap.validaciones||{});

      await fbSet(`historial/sesion_${Date.now()}`,{

    await fbDel("validaciones");

// ── CONTADOR ──────────────────────────────────────────────────────────────────
function ContadorView({equipoId, equipo, clienteKey, onBack}) {
  const cliente = CLIENTES[clienteKey]||Object.values(CLIENTES)[0];
  const [ubicacion, setUbicacion] = React.useState("");
  const [skus, setSkus] = React.useState([{id:uid(),sku:"",cantidad:""}]);
  const [nota, setNota] = React.useState("");
  const [errors, setErrors] = React.useState({});
  const [saved, setSaved] = React.useState(false);
  const [saving, setSaving] = React.useState(false);
  const [totalReg, setTotalReg] = React.useState(0);
  const [lastReg, setLastReg] = React.useState(null);
  const [timerStart, setTimerStart] = React.useState(null);
  const [timerSecs, setTimerSecs] = React.useState(0);
  const timerRef = React.useRef(null);

  React.useEffect(()=>{
    const off = fbOn(`registros/${equipoId}`, data=>{
      const regs = data ? Object.values(data) : [];
      setTotalReg(regs.length);
      if(regs.length>0) setLastReg(regs.sort((a,b)=>(b.ts||0)-(a.ts||0))[0]);
    });
    return ()=>{ off(); clearInterval(timerRef.current); };
  },[equipoId]);

  const startTimerIfNeeded = () => {
    if (!timerStart) {
      const now = Date.now();
      setTimerStart(now);
      timerRef.current = setInterval(()=> setTimerSecs(s=>s+1), 1000);
    }
  };
  const resetTimer = () => {
    clearInterval(timerRef.current);
    setTimerStart(null);
    setTimerSecs(0);
  };
  const addSku = () => setSkus(s=>[...s,{id:uid(),sku:"",cantidad:""}]);
  const removeSku = (id) => setSkus(s=>s.filter(x=>x.id!==id));
  const updateSku = (id,field,val) => setSkus(s=>s.map(x=>x.id===id?{...x,[field]:val}:x));

  const validate = () => {
    const e={};
    if(!ubicacion.trim()) e.ubicacion="Requerida";
    skus.forEach((s,i)=>{
      if(!s.sku.trim()) e[`sku_${i}`]="SKU requerido";
      if(s.cantidad===""||isNaN(s.cantidad)||Number(s.cantidad)<0) e[`cant_${i}`]="Inválida";
    });
    return e;
  };

  const handleGuardar = async () => {
    const e=validate(); if(Object.keys(e).length){setErrors(e);return;}
    const durSecs = timerStart ? Math.round((Date.now() - timerStart) / 1000) : 0;
    const durMins = parseFloat((durSecs / 60).toFixed(2));
    const totalPiezas = skus.reduce((s,x)=>s+Number(x.cantidad||0),0);
    setSaving(true);
    await fbPush(`registros/${equipoId}`,{
      ubicacion:ubicacion.trim().toUpperCase(),
      skus:skus.map(s=>({sku:s.sku.trim().toUpperCase(),cantidad:Number(s.cantidad)})),
      nota:nota.trim(), hora:ts(), ts:Date.now(),
      duracionSecs: durSecs, duracionMins: durMins, totalPiezas,
    });
    setSaving(false);
    resetTimer();
    setUbicacion(""); setSkus([{id:uid(),sku:"",cantidad:""}]); setNota(""); setErrors({});
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  };

  return (
    <div style={S.root}>
      <div style={{...S.nav,borderColor:cliente.color}}>
        <button style={S.navBtn} onClick={onBack}>← Salir</button>
        <div style={{flex:1}}>
          <div style={{color:cliente.color,fontWeight:900,fontSize:15,letterSpacing:1}}>{equipo.nombre||equipoId}</div>
          <div style={{color:"#D0D4E8",fontSize:11,fontWeight:600,marginTop:2}}>
            {(equipo.integrantes||[]).map(p=>`${p.rol}: ${p.nombre||"—"}`).join(" · ")}
          </div>
        </div>
        <div style={{textAlign:"right",display:"flex",gap:16,alignItems:"center"}}>
          {timerStart && (
            <div style={{textAlign:"center"}}>
              <div style={{color:"#FFD166",fontWeight:900,fontSize:18,fontFamily:"monospace"}}>
                {timerSecs>=3600?String(Math.floor(timerSecs/3600)).padStart(2,"0")+":":""}
                {String(Math.floor((timerSecs%3600)/60)).padStart(2,"0")}:{String(timerSecs%60).padStart(2,"0")}
              </div>
              <div style={{color:"#FFD16688",fontSize:10,fontWeight:700}}>en curso</div>
            </div>
          )}
          <div style={{textAlign:"center"}}>
            <div style={{color:"#FFFFFF",fontWeight:900,fontSize:20}}>{totalReg}</div>
            <div style={{color:"#C0C4D8",fontSize:11,fontWeight:600}}>posiciones</div>
          </div>
        </div>
      </div>

      <div style={{padding:"14px"}}>
        <div style={S.card}>
          <label style={S.lbl}>Ubicación</label>
          <input style={{...S.inp,...(errors.ubicacion?S.inpErr:{})}}
            placeholder={cliente.ubicacionPlaceholder} value={ubicacion}
            onChange={e=>{setUbicacion(e.target.value);setErrors(er=>({...er,ubicacion:null}));}}/>
          <span style={S.hint}>{cliente.ubicacionHint}</span>
          {errors.ubicacion && <span style={S.errMsg}>{errors.ubicacion}</span>}

          <div style={{marginTop:20,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <label style={{...S.lbl,margin:0}}>SKUs en esta posición</label>
            <button style={{background:cliente.color,border:"none",color:"#000",borderRadius:8,padding:"9px 16px",fontSize:14,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}
              onClick={addSku}>+ Agregar SKU</button>
          </div>

          {skus.map((s,i)=>(
            <div key={s.id} style={{display:"flex",gap:8,marginBottom:12,alignItems:"flex-start"}}>
              <div style={{flex:2}}>
                <div style={{color:"#D0D4E8",fontSize:12,fontWeight:700,marginBottom:5}}>SKU {i+1}</div>
                <input style={{...S.inp,...(errors[`sku_${i}`]?S.inpErr:{})}}
                  placeholder={cliente.skuPlaceholder} value={s.sku}
                  onChange={e=>{updateSku(s.id,"sku",e.target.value);setErrors(er=>({...er,[`sku_${i}`]:null}));startTimerIfNeeded();}}/>
                {errors[`sku_${i}`] && <span style={S.errMsg}>{errors[`sku_${i}`]}</span>}
              </div>
              <div style={{flex:1}}>
                <div style={{color:"#D0D4E8",fontSize:12,fontWeight:700,marginBottom:5}}>Cant.</div>
                <input style={{...S.inp,textAlign:"center",fontSize:24,fontWeight:900,...(errors[`cant_${i}`]?S.inpErr:{})}}
                  placeholder="0" type="number" inputMode="numeric" min="0" value={s.cantidad}
                  onChange={e=>{updateSku(s.id,"cantidad",e.target.value);setErrors(er=>({...er,[`cant_${i}`]:null}));}}
                  onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addSku();}}}/>
                {errors[`cant_${i}`] && <span style={S.errMsg}>{errors[`cant_${i}`]}</span>}
              </div>
              {skus.length>1 && (
                <button style={{background:"#2A1515",border:"2px solid #FF5555",color:"#FF5555",borderRadius:8,padding:"9px 11px",fontSize:15,cursor:"pointer",fontFamily:"inherit",alignSelf:"flex-end",marginBottom:2}}
                  onClick={()=>removeSku(s.id)}>✕</button>
              )}
            </div>
          ))}

          <label style={{...S.lbl,marginTop:10}}>Nota (daño, observación)</label>
          <input style={S.inp} placeholder="Opcional" value={nota} onChange={e=>setNota(e.target.value)}/>

          <button style={{...S.solidBtn,background:saved?"#00E6A8":cliente.color,color:"#000",marginTop:20,fontSize:16,opacity:saving?0.7:1}}
            onClick={handleGuardar} disabled={saving}>
            {saving?"Guardando...":saved?"✓ Posición guardada":"Registrar posición"}
          </button>
        </div>

        {lastReg && (
          <div style={{background:"#1C2030",border:`2px solid ${cliente.color}66`,borderRadius:12,padding:"13px 15px",marginTop:12}}>
            <div style={{color:"#C0C4D8",fontSize:11,fontWeight:700,letterSpacing:2,marginBottom:7}}>ÚLTIMO — {lastReg.hora}</div>
            <div style={{color:cliente.color,fontWeight:900,fontSize:16}}>{lastReg.ubicacion}</div>
            {(lastReg.skus||[]).map((s,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
                <span style={{color:"#E0E4F8",fontSize:13,fontWeight:600}}>{s.sku}</span>
                <span style={{color:"#FFFFFF",fontWeight:900,fontSize:15}}>{s.cantidad} uds</span>
              </div>
            ))}
          </div>
        )}
        <p style={{color:"#8A8FA8",fontSize:12,textAlign:"center",marginTop:14,fontWeight:600}}>Registros visibles para el supervisor en tiempo real</p>
      </div>
    </div>
  );
}

// ── SUPERVISOR ────────────────────────────────────────────────────────────────
function SupervisorView({clienteKey, onBack, onReset}) {
  const cliente = clienteKey ? CLIENTES[clienteKey] : null;
  const accentColor = cliente?.color||"#C8AEFF";
  const [fbData, setFbData] = React.useState({});
  const [equipos, setEquipos] = React.useState({});
  const [terceros, setTerceros] = React.useState({});
  const [filter, setFilter] = React.useState("all");
  const [saving, setSaving] = React.useState({});
  const [showCopyModal, setShowCopyModal] = React.useState(false);
  const [copied, setCopied] = React.useState(false);
  const [lastUpdate, setLastUpdate] = React.useState(null);
  const [refreshing, setRefreshing] = React.useState(false);
  const [editModal, setEditModal] = React.useState(null);
  const [editForm, setEditForm] = React.useState({});
  const [confirmDel, setConfirmDel] = React.useState(null);
  const [confirmDelTeam, setConfirmDelTeam] = React.useState(null);
  const [vistaPanel, setVistaPanel] = React.useState("conteo");
  const [historial, setHistorial] = React.useState([]);
  const [histLoading, setHistLoading] = React.useState(false);
  const [newTeamName, setNewTeamName] = React.useState("");

  const fetchAll = React.useCallback(async()=>{
    const [data, eqs] = await Promise.all([
      fbGet("/"),
      clienteKey ? fbGet(eqPath(clienteKey)) : Promise.resolve({}),
    ]);
    setFbData(data||{});
    setEquipos(eqs||{});
    setLastUpdate(new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit",second:"2-digit"}));
  },[clienteKey]);

  React.useEffect(()=>{
    // Listen to registros/validaciones at root
    const offRoot = fbOn("/", data=>{
      setFbData(data||{});
      setLastUpdate(new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit",second:"2-digit"}));
    });
    // Listen to equipos under client path
    const offEq = clienteKey
      ? fbOn(eqPath(clienteKey), data=>setEquipos(data||{}))
      : ()=>{};
    const poll = setInterval(fetchAll,5000);
    return ()=>{offRoot();offEq();clearInterval(poll);};
  },[fetchAll, clienteKey]);

  const fetchHistorial = React.useCallback(async()=>{
    setHistLoading(true);
    const data = await fbGet("historial");
    if(data) setHistorial(Object.entries(data).map(([id,s])=>({id,...s})).sort((a,b)=>b.id.localeCompare(a.id)));
    else setHistorial([]);
    setHistLoading(false);
  },[]);

  React.useEffect(()=>{if(vistaPanel==="historial") fetchHistorial();},[vistaPanel,fetchHistorial]);

  const eqIds = Object.keys(equipos);
  const cross = buildCrossMap(equipos, fbData.registros, fbData.validaciones);
  const counts = cross.reduce((acc,r)=>{const s=getStatus(r,eqIds);acc[s]=(acc[s]||0)+1;return acc;},{});
  const filtered = filter==="all"?cross:cross.filter(r=>getStatus(r,eqIds)===filter);

  // Team management — scoped per client
  const ep = (path) => `${eqPath(clienteKey)}/${path}`;
  const addTeam = async () => {
    if(!newTeamName.trim()) return;
    const id = uid();
    const roles = ROLES_NORMAL.map(r=>({rol:r,nombre:""}));
    await fbSet(ep(id),{nombre:newTeamName.trim(),integrantes:roles,tipo:"normal"});
    setNewTeamName("");
  };
  const deleteTeam = async (id) => {
    await fbDel(ep(id));
    await fbDel(`registros/${id}`);
    setConfirmDelTeam(null);
  };
  const updateIntegrante = async (teamId,idx,field,val) => {
    const eq = equipos[teamId]; if(!eq) return;
    const ints = [...(eq.integrantes||[])];
    ints[idx] = {...ints[idx],[field]:val};
    await fbSet(ep(`${teamId}/integrantes`),ints);
  };
  const addIntegrante = async (teamId,rol) => {
    const eq = equipos[teamId]; if(!eq) return;
    const ints = [...(eq.integrantes||[]),{rol,nombre:""}];
    await fbSet(ep(`${teamId}/integrantes`),ints);
  };
  const removeIntegrante = async (teamId,idx) => {
    const eq = equipos[teamId]; if(!eq) return;
    const ints = (eq.integrantes||[]).filter((_,i)=>i!==idx);
    await fbSet(ep(`${teamId}/integrantes`),ints);
  };
  const setTipoConteo = async (teamId,tipo) => {
    const roles = tipo==="auditoria"?ROLES_AUDITORIA:ROLES_NORMAL;
    await fbSet(ep(`${teamId}/integrantes`),roles.map(r=>({rol:r,nombre:""})));
    await fbSet(ep(`${teamId}/tipo`),tipo);
  };

  // Edit/delete registros
  const openEdit = (row,eqId) => {
    const eqData = row.equipos[eqId]; if(!eqData) return;
    setEditForm({eqId,fbId:eqData.fbId,ubicacion:row.ubicacion,sku:row.sku,cantidad:eqData.cantidad});
    setEditModal({row,eqId});
  };
  const saveEdit = async () => {
    const {eqId,fbId,ubicacion,sku,cantidad} = editForm;
    const rec = await fbGet(`registros/${eqId}/${fbId}`); if(!rec) return;
    const newSkus = (rec.skus||[]).map(s=>s.sku.toUpperCase()===editModal.row.sku?{...s,sku:sku.toUpperCase(),cantidad:Number(cantidad)}:s);
    await fbSet(`registros/${eqId}/${fbId}`,{...rec,ubicacion:ubicacion.toUpperCase(),skus:newSkus});
    await fbDel(`validaciones/${makeKey(editModal.row.ubicacion,editModal.row.sku)}`);
    setEditModal(null); await fetchAll();
  };
  const deleteRecord = async () => {
    await fbDel(`registros/${confirmDel.eqId}/${confirmDel.fbId}`);
    await fbDel(`validaciones/${makeKey(confirmDel.ubicacion,confirmDel.sku)}`);
    setConfirmDel(null); await fetchAll();
  };

  // CSV
  const buildCSV = () => {
    if(!cross.length) return "";
    const eqNames = eqIds.map(id=>equipos[id]?.nombre||id);
    const esc = v=>`"${(v||"").toString().replace(/"/g,'""')}"`;
    const header = [
      "Ubicacion","SKU",
      ...eqNames.map(n=>`Cant_${n}`),
      "Validado","Estatus",
      ...eqNames.map(n=>`Mins_${n}`),
      ...eqNames.map(n=>`Piezas_${n}`),
      ...eqNames.map(n=>`Nota_${n}`),
    ].join(",");
    const body = cross.map(r=>{
      const vals  = eqIds.map(id=>r.equipos[id]?.cantidad??"");
      const mins  = eqIds.map(id=>r.equipos[id]?.duracionMins??"");
      const pzas  = eqIds.map(id=>r.equipos[id]?.totalPiezas??"");
      const notas = eqIds.map(id=>esc(r.equipos[id]?.nota||""));
      return [r.ubicacion,r.sku,...vals,r.validado??"",getStatus(r,eqIds),...mins,...pzas,...notas].join(",");
    });
    return [header,...body].join("\n");
  };
  const exportCSV = () => {
    const text=buildCSV(); if(!text) return;
    try{const blob=new Blob([text],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`conteo_${clienteKey||"general"}_${new Date().toISOString().slice(0,10)}.csv`;a.click();}catch(e){console.error(e);}
  };
  const handleCopy = () => {
    const text=buildCSV(); if(!text) return;
    if(navigator.clipboard) navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});
    else{const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);setCopied(true);setTimeout(()=>setCopied(false),2500);}
  };
  const handleValidar = async (key,cantidad) => {
    setSaving(s=>({...s,[key]:true}));
    await fbSet(`validaciones/${key}`,Number(cantidad));
    setSaving(s=>({...s,[key]:false}));
  };

  const statBtns = [
    {k:"all",label:"Total",val:cross.length,color:"#D0D4E8"},
    {k:"ok",label:"✓ OK",val:counts.ok||0,color:"#00E6A8"},
    {k:"discrepancia",label:"⚠ Disc.",val:counts.discrepancia||0,color:"#FF5555"},
    {k:"incompleto",label:"◌ Inc.",val:counts.incompleto||0,color:"#D0D4E8"},
    {k:"validado",label:"✓✓ Val.",val:counts.validado||0,color:"#C8AEFF"},
  ];

  return (
    <div style={S.root}>
      {/* MODALS */}
      {editModal && (
        <div style={{position:"fixed",inset:0,background:"#000000EE",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#1C2030",border:"2px solid #C8AEFF",borderRadius:18,padding:"24px 20px",width:"100%",maxWidth:400}}>
            <p style={{color:"#FFFFFF",fontSize:16,fontWeight:900,marginBottom:18}}>✏️ Editar — {equipos[editModal.eqId]?.nombre||editModal.eqId}</p>
            {[["Ubicación","ubicacion"],["SKU","sku"]].map(([lbl,field])=>(
              <div key={field} style={{marginBottom:12}}>
                <label style={S.lbl}>{lbl}</label>
                <input style={S.inp} value={editForm[field]} onChange={e=>setEditForm(f=>({...f,[field]:e.target.value}))}/>
              </div>
            ))}
            <label style={S.lbl}>Cantidad</label>
            <input style={{...S.inp,fontSize:22,fontWeight:900,textAlign:"center"}} type="number" inputMode="numeric" min="0"
              value={editForm.cantidad} onChange={e=>setEditForm(f=>({...f,cantidad:e.target.value}))}/>
            <div style={{display:"flex",gap:10,marginTop:18}}>
              <button style={{flex:1,background:"#2A2D3A",border:"2px solid #8A8FA8",color:"#FFFFFF",borderRadius:12,padding:"13px",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setEditModal(null)}>Cancelar</button>
              <button style={{flex:1,background:"#C8AEFF",border:"none",color:"#0A0820",borderRadius:12,padding:"13px",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}} onClick={saveEdit}>✓ Guardar</button>
            </div>
          </div>
        </div>
      )}
      {confirmDel && <ConfirmModal title="¿Eliminar registro?" message={`${equipos[confirmDel.eqId]?.nombre||confirmDel.eqId} · ${confirmDel.ubicacion} · ${confirmDel.sku}\nEsta acción no se puede deshacer.`} confirmLabel="Sí, eliminar" onConfirm={deleteRecord} onCancel={()=>setConfirmDel(null)}/>}
      {confirmDelTeam && <ConfirmModal title="¿Eliminar equipo?" message={`Se eliminará "${equipos[confirmDelTeam]?.nombre}" y todos sus registros.`} confirmLabel="Sí, eliminar" onConfirm={()=>deleteTeam(confirmDelTeam)} onCancel={()=>setConfirmDelTeam(null)}/>}
      {showCopyModal && (
        <div style={{position:"fixed",inset:0,background:"#000000EE",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#1C2030",border:"2px solid #4A4D5A",borderRadius:18,padding:"24px 20px",width:"100%",maxWidth:480}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <p style={{color:"#FFFFFF",fontSize:15,fontWeight:800}}>Contenido CSV</p>
              <button style={{...S.navBtn,fontSize:12}} onClick={()=>setShowCopyModal(false)}>✕ Cerrar</button>
            </div>
            <textarea readOnly style={{...S.inp,height:180,resize:"none",fontSize:11,lineHeight:1.6,fontFamily:"monospace"}} value={buildCSV()} onFocus={e=>e.target.select()}/>
            <button style={{...S.solidBtn,background:copied?"#00E6A8":accentColor,color:"#000",marginTop:12,fontSize:15}} onClick={handleCopy}>
              {copied?"✓ Copiado":"📋 Copiar todo"}
            </button>
          </div>
        </div>
      )}

      {/* NAV */}
      <div style={{...S.nav,borderColor:accentColor}}>
        <button style={S.navBtn} onClick={onBack}>← Salir</button>
        <div style={{flex:1}}>
          <div style={{color:accentColor,fontWeight:900,fontSize:15,letterSpacing:1}}>SUPERVISOR</div>
          <div style={{color:"#D0D4E8",fontSize:11,fontWeight:600}}>{cliente?.nombre||"Sin cliente"} · {lastUpdate||"conectando..."}</div>
        </div>
        <button style={{...S.navBtn,color:"#C8AEFF",borderColor:"#C8AEFF",marginRight:4,fontSize:16}} onClick={async()=>{setRefreshing(true);await fetchAll();setRefreshing(false);}}>
          {refreshing?"...":"⟳"}
        </button>
        <button style={S.resetBtn} onClick={onReset}>↺</button>
      </div>

      {/* TABS */}
      <div style={{display:"flex",borderBottom:"2px solid #2E3240"}}>
        {[["conteo","📋 Conteo"],["equipos","👥 Equipos"],["historial","🕐 Historial"]].map(([v,lbl])=>(
          <button key={v} onClick={()=>setVistaPanel(v)}
            style={{flex:1,padding:"12px 6px",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit",border:"none",
              background:vistaPanel===v?"#1C2030":"transparent",
              color:vistaPanel===v?accentColor:"#6A6F82",
              borderBottom:vistaPanel===v?`3px solid ${accentColor}`:"3px solid transparent"}}>
            {lbl}
          </button>
        ))}
      </div>

      {/* ── TAB: EQUIPOS ── */}
      {vistaPanel==="equipos" && (
        <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"flex",gap:8}}>
            <input style={{...S.inp,flex:1}} placeholder="Nombre del nuevo equipo (Ej: Equipo A)"
              value={newTeamName} onChange={e=>setNewTeamName(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addTeam()}/>
            <button style={{background:"#00E6A8",border:"none",color:"#000",borderRadius:10,padding:"0 18px",fontSize:14,fontWeight:900,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}
              onClick={addTeam}>+ Nuevo</button>
          </div>

          {Object.keys(equipos).length===0 && (
            <div style={{border:"2px dashed #3A3D4A",borderRadius:12,padding:"24px",textAlign:"center"}}>
              <p style={{color:"#6A6F82",fontSize:13}}>No hay equipos. Agrega uno arriba.</p>
            </div>
          )}

          {Object.entries(equipos).map(([id,eq])=>(
            <div key={id} style={{background:"#1C2030",border:"2px solid #3A3D4A",borderRadius:14,padding:"16px"}}>
              <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}>
                <input style={{...S.inp,flex:1,fontSize:16,fontWeight:900}}
                  value={eq.nombre||""} placeholder="Nombre del equipo"
                  onChange={e=>fbSet(`equipos/${id}/nombre`,e.target.value)}/>
                <button style={{background:"#2A1515",border:"2px solid #FF5555",color:"#FF5555",borderRadius:8,padding:"8px 12px",fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}
                  onClick={()=>setConfirmDelTeam(id)}>🗑 Quitar</button>
              </div>

              {/* Tipo de conteo */}
              <label style={S.lbl}>Tipo de conteo</label>
              <div style={{display:"flex",gap:8,marginBottom:14}}>
                {[["normal","🔄 Normal"],["auditoria","🔍 Auditoría"]].map(([tipo,lbl])=>{
                  const activo = eq.tipo===tipo||(!eq.tipo&&tipo==="normal");
                  return (
                    <button key={tipo} onClick={()=>setTipoConteo(id,tipo)}
                      style={{flex:1,padding:"9px",borderRadius:9,fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit",
                        background:activo?"#2A3A50":"#0E1016",border:`2px solid ${activo?"#7B9FFF":"#3A3D4A"}`,
                        color:activo?"#7B9FFF":"#6A6F82"}}>
                      {lbl}
                    </button>
                  );
                })}
              </div>

              {/* Integrantes */}
              <label style={S.lbl}>Integrantes</label>
              {(eq.integrantes||[]).map((p,idx)=>(
                <div key={idx} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                  <div style={{background:"#0E1016",border:"1px solid #3A3D4A",borderRadius:8,padding:"9px 12px",fontSize:12,fontWeight:700,color:"#A0A4B8",minWidth:90,whiteSpace:"nowrap"}}>
                    {p.rol}
                  </div>
                  <input style={{...S.inp,flex:1,fontSize:14}} placeholder={`Nombre del ${p.rol}`}
                    value={p.nombre||""}
                    onChange={e=>updateIntegrante(id,idx,"nombre",e.target.value)}/>
                  <button style={{background:"#2A1515",border:"2px solid #FF5555",color:"#FF5555",borderRadius:8,padding:"8px 10px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}
                    onClick={()=>removeIntegrante(id,idx)}>✕</button>
                </div>
              ))}
              <div style={{display:"flex",gap:8,marginTop:6}}>
                {(eq.tipo==="auditoria"?ROLES_AUDITORIA:ROLES_NORMAL).map(rol=>(
                  <button key={rol} style={{flex:1,background:"transparent",border:"1px dashed #4A4D5A",color:"#8A8FA8",borderRadius:8,padding:"8px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}
                    onClick={()=>addIntegrante(id,rol)}>+ {rol}</button>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── TAB: HISTORIAL ── */}
      {vistaPanel==="historial" && (
        <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={S.secLbl}>Sesiones anteriores</span>
            <button style={{...S.navBtn,fontSize:11}} onClick={fetchHistorial}>⟳ Actualizar</button>
          </div>
          {histLoading && <p style={{color:"#8A8FA8",textAlign:"center",marginTop:24,fontSize:14}}>Cargando...</p>}
          {!histLoading && historial.length===0 && <p style={{color:"#8A8FA8",textAlign:"center",marginTop:24,fontSize:13}}>Sin sesiones anteriores</p>}
          {historial.map(s=>{
            const c=CLIENTES[s.cliente];
            return (
              <div key={s.id} style={{background:"#1C2030",border:`2px solid ${c?c.color+"66":"#3A3D4A"}`,borderRadius:14,padding:"14px"}}>
                <div style={{color:c?c.color:"#C8AEFF",fontWeight:900,fontSize:15,marginBottom:4}}>{c?c.nombre:s.cliente}</div>
                <div style={{color:"#C0C4D8",fontSize:12,marginBottom:12}}>{s.fecha} · {s.hora}</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {[{l:"Registros",v:s.totalRegistros||0,c:"#D0D4E8"},{l:"Disc.",v:s.discrepancias||0,c:"#FF5555"},{l:"Validados",v:s.validados||0,c:"#C8AEFF"}].map(st=>(
                    <div key={st.l} style={{background:"#0E1016",border:`1px solid ${st.c}44`,borderRadius:10,padding:"9px 14px",textAlign:"center",minWidth:75}}>
                      <div style={{fontSize:20,fontWeight:900,color:st.c}}>{st.v}</div>
                      <div style={{fontSize:10,color:"#8A8FA8",fontWeight:700,marginTop:2}}>{st.l}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── TAB: CONTEO ── */}
      {vistaPanel==="conteo" && (
        <>
          <div style={{display:"flex",gap:6,padding:"12px 16px",overflowX:"auto"}}>
            {statBtns.map(s=>(
              <button key={s.k} onClick={()=>setFilter(s.k)}
                style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                  border:`2px solid ${filter===s.k?s.color:"#4A4D5A"}`,borderRadius:12,
                  padding:"10px 12px",cursor:"pointer",fontFamily:"inherit",
                  background:filter===s.k?s.color+"22":"#1C2030",minWidth:64,flexShrink:0}}>
                <span style={{fontSize:22,fontWeight:900,color:s.color}}>{s.val}</span>
                <span style={{fontSize:10,color:filter===s.k?s.color:"#C0C4D8",fontWeight:800}}>{s.label}</span>
              </button>
            ))}
          </div>
          <div style={{padding:"0 16px 12px",display:"flex",gap:8}}>
            <button style={{...S.solidBtn,background:accentColor,color:"#000",fontSize:14}} onClick={exportCSV}>↓ Descargar CSV</button>
            <button style={{...S.solidBtn,background:"#2A2D3A",border:"2px solid #6A6F82",color:"#FFFFFF",fontSize:14}} onClick={()=>setShowCopyModal(true)}>📋 Copiar</button>
          </div>
          <div style={{padding:"0 16px 60px",display:"flex",flexDirection:"column",gap:12}}>
            {filtered.length===0 && <p style={{color:"#A0A4B8",textAlign:"center",marginTop:40,fontSize:15,fontWeight:600}}>Sin registros aún</p>}
            {filtered.map(row=>{
              const key = makeKey(row.ubicacion,row.sku);
              const status = getStatus(row,eqIds);
              const sc = STATUS_CFG[status];
              return (
                <div key={key} style={{background:"#1C2030",border:`2px solid ${sc.color}`,borderRadius:16,padding:"14px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,gap:8}}>
                    <div>
                      <div style={{color:accentColor,fontWeight:900,fontSize:17}}>{row.ubicacion}</div>
                      <div style={{color:"#E0E4F8",fontSize:14,fontWeight:700,marginTop:2}}>{row.sku}</div>
                    </div>
                    <Badge status={status}/>
                  </div>

                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {eqIds.map(id=>{
                      const eqData = row.equipos[id];
                      return (
                        <div key={id} style={{flex:1,minWidth:80,background:"#0E1016",border:`2px solid ${eqData?sc.color+"55":"#2A2D3A"}`,borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
                          <div style={{fontSize:10,color:"#C0C4D8",letterSpacing:1,fontWeight:800,marginBottom:5}}>{equipos[id]?.nombre||id}</div>
                          <div style={{fontSize:28,fontWeight:900,color:eqData?"#FFFFFF":"#4A4D5A"}}>{eqData?.cantidad??"—"}</div>
                          {eqData?.duracionMins!=null && <div style={{fontSize:10,color:"#FFD166",marginTop:3,fontWeight:700}}>⏱ {eqData.duracionMins} min</div>}
                          {eqData?.nota && <div style={{fontSize:10,color:"#FF9955",marginTop:2}}>⚠ {eqData.nota}</div>}
                        </div>
                      );
                    })}
                    {row.validado!==null && row.validado!==undefined && (
                      <>
                        <div style={{color:"#6A6F82",fontSize:18,alignSelf:"center",fontWeight:900}}>→</div>
                        <div style={{flex:1,minWidth:80,background:"#C8AEFF18",border:"2px solid #C8AEFF",borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
                          <div style={{fontSize:10,color:"#C8AEFF",letterSpacing:1,fontWeight:800,marginBottom:5}}>VALIDADO</div>
                          <div style={{fontSize:28,fontWeight:900,color:"#C8AEFF"}}>{row.validado}</div>
                        </div>
                      </>
                    )}
                  </div>

                  <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
                    {eqIds.filter(id=>row.equipos[id]).map(id=>(
                      <React.Fragment key={id}>
                        <button style={{background:"#1E2A40",border:"2px solid #4A6FA8",color:"#A8C8FF",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}
                          onClick={()=>openEdit(row,id)}>✏️ {equipos[id]?.nombre||id}</button>
                        <button style={{background:"#2A1515",border:"2px solid #FF5555",color:"#FF5555",borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}
                          onClick={()=>setConfirmDel({fbId:row.equipos[id].fbId,eqId:id,ubicacion:row.ubicacion,sku:row.sku})}>🗑</button>
                      </React.Fragment>
                    ))}
                  </div>

                  {status==="discrepancia" && row.validado===null && (
                    <div style={{marginTop:12,background:"#200F0F",border:"2px solid #FF5555",borderRadius:12,padding:"12px"}}>
                      <p style={{color:"#FF5555",fontSize:14,fontWeight:800,marginBottom:10}}>⚠ Requiere 3er conteo:</p>
                      <div style={{display:"flex",gap:8}}>
                        <input style={{...S.inp,flex:1,textAlign:"center",fontSize:24,fontWeight:900}}
                          type="number" inputMode="numeric" min="0" placeholder="?"
                          value={terceros[key]??""} onChange={e=>setTerceros(t=>({...t,[key]:e.target.value}))}/>
                        <button style={{background:"#FF5555",border:"none",color:"#FFFFFF",borderRadius:10,padding:"0 18px",fontSize:15,fontWeight:900,cursor:"pointer",fontFamily:"inherit",minWidth:80}}
                          onClick={()=>{if(terceros[key]!=null&&terceros[key]!=="")handleValidar(key,terceros[key]);}}>
                          {saving[key]?"...":"✓ OK"}
                        </button>
                      </div>
                    </div>
                  )}
                  {status==="ok" && row.validado===null && (
                    <button style={{marginTop:10,background:"#00E6A820",border:"2px solid #00E6A8",color:"#00E6A8",borderRadius:10,padding:"12px",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit",width:"100%"}}
                      onClick={()=>handleValidar(key,Object.values(row.equipos)[0]?.cantidad)}>
                      {saving[key]?"Guardando...":"✓ Confirmar cantidad"}
                    </button>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

// ── PIN SCREEN (reutilizable) ─────────────────────────────────────────────────
function PinScreen({titulo, emoji, accentColor, pinCorrecto, onSuccess, onBack}) {
  const [pin, setPin] = React.useState("");
  const [error, setError] = React.useState(false);
  const check = () => {
    if (pin === pinCorrecto) { onSuccess(); }
    else { setError(true); setPin(""); }
  };
  return (
    <div style={S.center}>
      <div style={S.pinCard}>
        <div style={{fontSize:34,marginBottom:10,textAlign:"center"}}>{emoji}</div>
        <p style={{color:"#FFFFFF",letterSpacing:2,fontSize:15,fontWeight:800,textAlign:"center",marginBottom:18}}>{titulo}</p>
        <input style={{...S.inp,textAlign:"center",fontSize:26,fontWeight:900,letterSpacing:10}}
          type="password" inputMode="numeric" maxLength={4} value={pin}
          onChange={e=>{setPin(e.target.value);setError(false);}}
          placeholder="••••"
          onKeyDown={e=>e.key==="Enter"&&check()}/>
        {error && <p style={{color:"#FF5555",fontSize:13,fontWeight:800,textAlign:"center",marginTop:8}}>PIN incorrecto</p>}
        <button style={{...S.solidBtn,background:accentColor,color:"#0A0820",marginTop:16}} onClick={check}>Entrar</button>
        <button style={S.textBtn} onClick={onBack}>← Volver</button>
      </div>
    </div>
  );
}

// ── RECEPCIONISTA VIEW ────────────────────────────────────────────────────────
function RecepcionistaView({clienteKey, onBack}) {
  const accentColor = "#69CAFF";
  const [contenedores, setContenedores] = React.useState({});
  const [vistaRec, setVistaRec] = React.useState("lista"); // lista | nuevo | detalle
  const [selectedId, setSelectedId] = React.useState(null);
  const [confirmDelCont, setConfirmDelCont] = React.useState(null);

  // Form state - nuevo contenedor
  const [numContenedor, setNumContenedor] = React.useState("");
  const [transportista, setTransportista] = React.useState("");
  const [clienteContKey, setClienteContKey] = React.useState(clienteKey||"");
  const [skus, setSkus] = React.useState([{id:uid(),sku:"",esperado:"",recibido:"",danado:"",notaDano:""}]);
  const [obsGeneral, setObsGeneral] = React.useState("");
  const [saving, setSaving] = React.useState(false);
  const [saved, setSaved] = React.useState(false);
  const [showCopyModal, setShowCopyModal] = React.useState(false);
  const [copied, setCopied] = React.useState(false);

  React.useEffect(()=>{
    const off = fbOn("contenedores", data=>setContenedores(data||{}));
    return off;
  },[]);

  const addSku = () => setSkus(s=>[...s,{id:uid(),sku:"",esperado:"",recibido:"",danado:"",notaDano:""}]);
  const removeSku = (id) => setSkus(s=>s.filter(x=>x.id!==id));
  const updateSku = (id,field,val) => setSkus(s=>s.map(x=>x.id===id?{...x,[field]:val}:x));

  const resetForm = () => {
    setNumContenedor(""); setTransportista(""); setObsGeneral("");
    setSkus([{id:uid(),sku:"",esperado:"",recibido:"",danado:"",notaDano:""}]);
    setSaved(false);
  };

  const handleGuardar = async () => {
    if (!numContenedor.trim() || !clienteContKey) return;
    setSaving(true);
    const clienteNombre = CLIENTES[clienteContKey]?.nombre||clienteContKey;
    await fbPush("contenedores",{
      cliente: clienteContKey,
      clienteNombre,
      numContenedor: numContenedor.trim().toUpperCase(),
      transportista: transportista.trim(),
      fecha: dateStr(), hora: ts(), ts: Date.now(),
      skus: skus.filter(s=>s.sku.trim()).map(s=>({
        sku: s.sku.trim().toUpperCase(),
        esperado: Number(s.esperado)||0,
        recibido: Number(s.recibido)||0,
        danado: Number(s.danado)||0,
        notaDano: s.notaDano.trim(),
        diferencia: (Number(s.recibido)||0)-(Number(s.esperado)||0),
      })),
      obsGeneral: obsGeneral.trim(),
    });
    setSaving(false); setSaved(true);
    setTimeout(()=>{ resetForm(); setVistaRec("lista"); },1500);
  };

  const deleteContenedor = async () => {
    await fbDel(`contenedores/${confirmDelCont}`);
    setConfirmDelCont(null);
    if (selectedId===confirmDelCont) { setSelectedId(null); setVistaRec("lista"); }
  };

  const buildCSVContenedor = (cont) => {
    if(!cont) return "";
    const header = "SKU,Esperado,Recibido,Danado,Diferencia,Nota_Dano";
    const rows = (cont.skus||[]).map(s=>
      `${s.sku},${s.esperado},${s.recibido},${s.danado||0},${s.diferencia},"${(s.notaDano||"").replace(/"/g,'""')}"`
    );
    return [`Contenedor: ${cont.numContenedor}`,`Cliente: ${cont.clienteNombre}`,
      `Fecha: ${cont.fecha} ${cont.hora}`,`Transportista: ${cont.transportista||"—"}`,
      `Observaciones: ${cont.obsGeneral||"—"}`,"",header,...rows].join("\n");
  };

  const handleCopyCont = (cont) => {
    const text = buildCSVContenedor(cont); if(!text) return;
    if(navigator.clipboard) navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
    else{const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);setCopied(true);setTimeout(()=>setCopied(false),2000);}
  };

  const exportCSVCont = (cont) => {
    const text=buildCSVContenedor(cont); if(!text) return;
    try{const blob=new Blob([text],{type:"text/csv"});const a=document.createElement("a");
      a.href=URL.createObjectURL(blob);
      a.download=`contenedor_${cont.numContenedor}_${cont.fecha.replace(/\//g,"-")}.csv`;a.click();}catch(e){console.error(e);}
  };

  const contList = Object.entries(contenedores).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0));
  const selectedCont = selectedId ? contenedores[selectedId] : null;

  const hasDanos = (cont) => (cont.skus||[]).some(s=>s.danado>0||s.notaDano);
  const hasDiferencias = (cont) => (cont.skus||[]).some(s=>s.diferencia!==0);

  return (
    <div style={S.root}>
      {confirmDelCont && (
        <ConfirmModal title="¿Eliminar registro?" message="Se eliminará el registro de este contenedor. Esta acción no se puede deshacer."
          confirmLabel="Sí, eliminar" onConfirm={deleteContenedor} onCancel={()=>setConfirmDelCont(null)}/>
      )}
      {showCopyModal && selectedCont && (
        <div style={{position:"fixed",inset:0,background:"#000000EE",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#1C2030",border:"2px solid #4A4D5A",borderRadius:18,padding:"24px 20px",width:"100%",maxWidth:480}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <p style={{color:"#FFFFFF",fontSize:15,fontWeight:800}}>Reporte CSV</p>
              <button style={{...S.navBtn,fontSize:12}} onClick={()=>setShowCopyModal(false)}>✕ Cerrar</button>
            </div>
            <textarea readOnly style={{...S.inp,height:200,resize:"none",fontSize:11,lineHeight:1.6,fontFamily:"monospace"}}
              value={buildCSVContenedor(selectedCont)} onFocus={e=>e.target.select()}/>
            <button style={{...S.solidBtn,background:copied?"#00E6A8":accentColor,color:"#000",marginTop:12,fontSize:15}} onClick={()=>handleCopyCont(selectedCont)}>
              {copied?"✓ Copiado":"📋 Copiar reporte"}
            </button>
          </div>
        </div>
      )}

      {/* NAV */}
      <div style={{...S.nav,borderColor:accentColor}}>
        <button style={S.navBtn} onClick={vistaRec==="lista"?onBack:()=>{setVistaRec("lista");setSelectedId(null);}}>← {vistaRec==="lista"?"Salir":"Volver"}</button>
        <div style={{flex:1}}>
          <div style={{color:accentColor,fontWeight:900,fontSize:15,letterSpacing:1}}>RECEPCIONISTA</div>
          <div style={{color:"#D0D4E8",fontSize:11,fontWeight:600}}>Validación de contenedores</div>
        </div>
        {vistaRec==="lista" && (
          <button style={{...S.navBtn,background:"#69CAFF",color:"#000",border:"none",fontWeight:900}}
            onClick={()=>{resetForm();setVistaRec("nuevo");}}>+ Nuevo</button>
        )}
      </div>

      {/* ── LISTA DE CONTENEDORES ── */}
      {vistaRec==="lista" && (
        <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:10}}>
          <span style={S.secLbl}>Contenedores registrados ({contList.length})</span>
          {contList.length===0 && (
            <div style={{border:"2px dashed #3A3D4A",borderRadius:12,padding:"32px",textAlign:"center"}}>
              <p style={{color:"#6A6F82",fontSize:14}}>No hay contenedores registrados</p>
              <p style={{color:"#4A4D5A",fontSize:12,marginTop:6}}>Presiona "+ Nuevo" para registrar uno</p>
            </div>
          )}
          {contList.map(([id,cont])=>{
            const danos = hasDanos(cont);
            const difs = hasDiferencias(cont);
            const c = CLIENTES[cont.cliente];
            return (
              <div key={id}
                style={{background:"#1C2030",border:`2px solid ${danos?"#FF5555":difs?"#FFD166":"#3A3D4A"}`,borderRadius:14,padding:"14px",cursor:"pointer"}}
                onClick={()=>{setSelectedId(id);setVistaRec("detalle");}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{color:"#FFFFFF",fontWeight:900,fontSize:16}}>📦 {cont.numContenedor}</div>
                    <div style={{color:c?c.color:"#C8AEFF",fontSize:13,fontWeight:700,marginTop:3}}>{cont.clienteNombre}</div>
                    <div style={{color:"#8A8FA8",fontSize:11,marginTop:3}}>{cont.fecha} · {cont.hora}</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end"}}>
                    {danos && <span style={{fontSize:11,fontWeight:800,color:"#FF5555",background:"#FF555520",border:"1px solid #FF5555",borderRadius:6,padding:"2px 8px"}}>⚠ Daños</span>}
                    {difs && !danos && <span style={{fontSize:11,fontWeight:800,color:"#FFD166",background:"#FFD16620",border:"1px solid #FFD166",borderRadius:6,padding:"2px 8px"}}>≠ Diferencias</span>}
                    {!danos && !difs && <span style={{fontSize:11,fontWeight:800,color:"#00E6A8",background:"#00E6A820",border:"1px solid #00E6A8",borderRadius:6,padding:"2px 8px"}}>✓ OK</span>}
                    <span style={{color:"#6A6F82",fontSize:18}}>→</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── DETALLE CONTENEDOR ── */}
      {vistaRec==="detalle" && selectedCont && (
        <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:12}}>
          <div style={{background:"#1C2030",border:"2px solid #3A3D4A",borderRadius:14,padding:"16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div>
                <div style={{color:accentColor,fontWeight:900,fontSize:20}}>📦 {selectedCont.numContenedor}</div>
                <div style={{color:CLIENTES[selectedCont.cliente]?.color||"#C8AEFF",fontSize:14,fontWeight:700,marginTop:3}}>{selectedCont.clienteNombre}</div>
                <div style={{color:"#8A8FA8",fontSize:12,marginTop:3}}>{selectedCont.fecha} · {selectedCont.hora}</div>
                {selectedCont.transportista && <div style={{color:"#C0C4D8",fontSize:12,marginTop:2}}>🚛 {selectedCont.transportista}</div>}
              </div>
              <button style={{background:"#2A1515",border:"2px solid #FF5555",color:"#FF5555",borderRadius:8,padding:"8px 12px",fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}
                onClick={()=>setConfirmDelCont(selectedId)}>🗑 Eliminar</button>
            </div>
            {selectedCont.obsGeneral && (
              <div style={{background:"#0E1016",border:"1px solid #3A3D4A",borderRadius:8,padding:"10px 12px",marginBottom:12}}>
                <span style={{color:"#A0A4B8",fontSize:12,fontWeight:700}}>OBS: </span>
                <span style={{color:"#E0E4F8",fontSize:13}}>{selectedCont.obsGeneral}</span>
              </div>
            )}
          </div>

          {/* SKUs */}
          {(selectedCont.skus||[]).map((s,i)=>{
            const status = s.danado>0?"dano":s.diferencia>0?"exceso":s.diferencia<0?"faltante":"ok";
            const statusCfg = {
              ok:{color:"#00E6A8",label:"✓ OK"},
              dano:{color:"#FF5555",label:"⚠ Daño"},
              exceso:{color:"#FFD166",label:"↑ Exceso"},
              faltante:{color:"#FF9955",label:"↓ Faltante"},
            }[status];
            return (
              <div key={i} style={{background:"#1C2030",border:`2px solid ${statusCfg.color}55`,borderRadius:12,padding:"14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <span style={{color:"#FFFFFF",fontWeight:900,fontSize:15}}>{s.sku}</span>
                  <span style={{fontSize:11,fontWeight:800,color:statusCfg.color,border:`1px solid ${statusCfg.color}`,borderRadius:6,padding:"2px 8px"}}>{statusCfg.label}</span>
                </div>
                <div style={{display:"flex",gap:8}}>
                  {[["Esperado",s.esperado,"#C0C4D8"],["Recibido",s.recibido,"#FFFFFF"],["Dañado",s.danado,"#FF5555"],["Diferencia",(s.diferencia>0?"+":"")+s.diferencia,s.diferencia===0?"#00E6A8":s.diferencia>0?"#FFD166":"#FF9955"]].map(([lbl,val,col])=>(
                    <div key={lbl} style={{flex:1,background:"#0E1016",border:"1px solid #2A2D3A",borderRadius:8,padding:"8px",textAlign:"center"}}>
                      <div style={{fontSize:9,color:"#6A6F82",fontWeight:700,letterSpacing:1,marginBottom:4}}>{lbl.toUpperCase()}</div>
                      <div style={{fontSize:20,fontWeight:900,color:col}}>{val}</div>
                    </div>
                  ))}
                </div>
                {s.notaDano && <div style={{marginTop:8,background:"#200F0F",border:"1px solid #FF555544",borderRadius:8,padding:"8px 10px",color:"#FF9955",fontSize:12}}>⚠ {s.notaDano}</div>}
              </div>
            );
          })}

          {/* Export buttons */}
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button style={{...S.solidBtn,background:accentColor,color:"#000",fontSize:14}} onClick={()=>exportCSVCont(selectedCont)}>↓ Descargar CSV</button>
            <button style={{...S.solidBtn,background:"#2A2D3A",border:"2px solid #6A6F82",color:"#FFFFFF",fontSize:14}} onClick={()=>setShowCopyModal(true)}>📋 Copiar</button>
          </div>
        </div>
      )}

      {/* ── NUEVO CONTENEDOR ── */}
      {vistaRec==="nuevo" && (
        <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:14}}>
          <div style={S.card}>
            <label style={S.lbl}>Cliente</label>
            <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:200,overflowY:"auto",border:"2px solid #2E3240",borderRadius:10,padding:"6px",marginBottom:4}}>
              {Object.entries(CLIENTES).map(([k,c])=>(
                <button key={k} style={{borderLeft:`4px solid ${c.color}`,background:clienteContKey===k?c.dark:"transparent",border:"none",borderLeft:`4px solid ${clienteContKey===k?c.color:"#3A3D4A"}`,borderRadius:8,padding:"9px 14px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",textAlign:"left"}}
                  onClick={()=>setClienteContKey(k)}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:c.color,flexShrink:0}}/>
                  <span style={{color:clienteContKey===k?c.color:"#C0C4D8",fontWeight:clienteContKey===k?900:600,fontSize:14}}>{c.nombre}</span>
                  {clienteContKey===k && <span style={{marginLeft:"auto",color:c.color,fontSize:14}}>✓</span>}
                </button>
              ))}
            </div>

            <label style={{...S.lbl,marginTop:14}}>N° de Contenedor / Sello</label>
            <input style={S.inp} placeholder="Ej: CONT-2024-001 o #123456"
              value={numContenedor} onChange={e=>setNumContenedor(e.target.value)}/>

            <label style={{...S.lbl,marginTop:14}}>Transportista (opcional)</label>
            <input style={S.inp} placeholder="Nombre de la empresa o conductor"
              value={transportista} onChange={e=>setTransportista(e.target.value)}/>
          </div>

          {/* SKUs */}
          <div style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <label style={{...S.lbl,margin:0}}>Mercancía recibida</label>
              <button style={{background:accentColor,border:"none",color:"#000",borderRadius:8,padding:"9px 16px",fontSize:13,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}
                onClick={addSku}>+ SKU</button>
            </div>

            {skus.map((s,i)=>(
              <div key={s.id} style={{background:"#0E1016",border:"2px solid #2A2D3A",borderRadius:12,padding:"12px",marginBottom:10}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
                  <input style={{...S.inp,flex:1,fontSize:14}} placeholder="SKU o código de barras"
                    value={s.sku} onChange={e=>updateSku(s.id,"sku",e.target.value)}/>
                  {skus.length>1 && (
                    <button style={{background:"#2A1515",border:"2px solid #FF5555",color:"#FF5555",borderRadius:8,padding:"8px 10px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}
                      onClick={()=>removeSku(s.id)}>✕</button>
                  )}
                </div>
                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  {[["esperado","Esperado"],["recibido","Recibido"],["danado","Dañado"]].map(([field,lbl])=>(
                    <div key={field} style={{flex:1}}>
                      <div style={{color:"#A0A4B8",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:5}}>{lbl.toUpperCase()}</div>
                      <input style={{...S.inp,textAlign:"center",fontSize:20,fontWeight:900}}
                        type="number" inputMode="numeric" min="0" placeholder="0"
                        value={s[field]} onChange={e=>updateSku(s.id,field,e.target.value)}/>
                    </div>
                  ))}
                </div>
                {(Number(s.danado)>0) && (
                  <div>
                    <div style={{color:"#FF9955",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:5}}>NOTA DE DAÑO</div>
                    <input style={{...S.inp,fontSize:13}} placeholder="Describe el daño observado"
                      value={s.notaDano} onChange={e=>updateSku(s.id,"notaDano",e.target.value)}/>
                  </div>
                )}
              </div>
            ))}
          </div>

          <div style={S.card}>
            <label style={S.lbl}>Observaciones generales</label>
            <input style={S.inp} placeholder="Condición del sello, temperatura, incidencias generales..."
              value={obsGeneral} onChange={e=>setObsGeneral(e.target.value)}/>
          </div>

          <button style={{...S.solidBtn,background:saved?"#00E6A8":accentColor,color:"#000",fontSize:16,opacity:saving?0.7:1}}
            onClick={handleGuardar} disabled={saving||!numContenedor.trim()||!clienteContKey}>
            {saving?"Guardando...":saved?"✓ Contenedor registrado":"Registrar contenedor"}
          </button>
        </div>
      )}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
} catch(e) {
  console.error(e);
  document.getElementById("root").innerHTML='<div style="padding:40px;color:#FF5555;font-family:monospace;text-align:center"><p style="font-size:18px;font-weight:800">⚠ Error al cargar</p><p style="color:#aaa;margin-top:10px;font-size:13px">Abre F12 para ver el detalle</p><button onclick="location.reload()" style="margin-top:20px;padding:14px 28px;background:#C8AEFF;border:none;border-radius:10px;font-size:16px;cursor:pointer;font-weight:800">Reintentar</button></div>';
}
  </script>
</body>
</html>
