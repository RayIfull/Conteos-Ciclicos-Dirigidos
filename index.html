const fbOn   = (p,cb) => {
  const ref = db.ref(p||"/");

};

// ── CROSS MAP ─────────────────────────────────────────────────────────────────
function buildCrossMap(equipos,registros,validaciones){
  const map={};
  Object.keys(equipos||{}).forEach(eqId=>{
    Object.entries(registros&&registros[eqId]||{}).forEach(([fbId,reg])=>{
      (reg.skus||[]).forEach(s=>{
        const key=makeKey(reg.ubicacion,s.sku);
        if(!map[key]) map[key]={ubicacion:reg.ubicacion,sku:s.sku.toUpperCase(),validado:null,equipos:{}};
        map[key].equipos[eqId]={cantidad:s.cantidad,fbId,nota:reg.nota||"",duracionMins:reg.duracionMins||null,totalPiezas:reg.totalPiezas||null};
      });
    });
  });
  const vals=validaciones||{};
  Object.keys(map).forEach(k=>{map[k].validado=vals[k]!==undefined?vals[k]:null;});
  return Object.values(map).sort((a,b)=>a.ubicacion.localeCompare(b.ubicacion)||a.sku.localeCompare(b.sku));
}
function getStatus(row,eqIds){
  if(row.validado!==null&&row.validado!==undefined) return "validado";
  const counts=eqIds.map(id=>row.equipos[id]?.cantidad??null).filter(v=>v!==null);
  if(counts.length<eqIds.length) return "incompleto";
  return counts.every(v=>v===counts[0])?"ok":"discrepancia";
}

// ── PANTALLA DE SELECCIÓN DE CLIENTE + EMPLEADO ───────────────────────────────
function ClienteEmpleadoSelector({actividad,onConfirm,onBack}){
  const accentColor = actividad==="conteo"?"#7B9FFF":"#69CAFF";
  const [clienteKey,setClienteKey]=React.useState("");
  const [empleadoNombre,setEmpleadoNombre]=React.useState("");
  const [empleadosGuardados,setEmpleadosGuardados]=React.useState([]);
  const [equipos,setEquipos]=React.useState({});
  const [equipoId,setEquipoId]=React.useState("");
  const [error,setError]=React.useState("");

  React.useEffect(()=>{
    fbGet("empleados").then(data=>{
      if(data) setEmpleadosGuardados(Object.values(data).map(e=>e.nombre||e).filter(Boolean));
    });
  },[]);

  React.useEffect(()=>{
    if(!clienteKey||actividad!=="conteo") return;
    const off=fbOn(eqPath(clienteKey),data=>{setEquipos(data||{});setEquipoId("");});
    return off;
  },[clienteKey,actividad]);

  const eqList=Object.entries(equipos);

  const handleConfirm=async()=>{
    if(!clienteKey){setError("Selecciona un cliente");return;}
    if(!empleadoNombre.trim()){setError("Ingresa tu nombre");return;}
    if(actividad==="conteo"&&!equipoId){setError("Selecciona tu equipo");return;}
    // Register active employee
    const sessionId=uid();
    await fbSet("empleados_activos/"+sessionId,{
      nombre:empleadoNombre.trim(),
      actividad:actividad==="conteo"?"Conteo":"Recepción",
      cliente:CLIENTES[clienteKey]?.nombre||clienteKey,
      equipo:actividad==="conteo"?(equipos[equipoId]?.nombre||equipoId):"—",
      hora:ts(),
      sessionId,
    });
    // Save employee name for future use
    const existing=await fbGet("empleados");
    const names=existing?Object.values(existing).map(e=>e.nombre||e):[];
    if(!names.includes(empleadoNombre.trim())){
      await fbPush("empleados",{nombre:empleadoNombre.trim()});
    }
    onConfirm({clienteKey,empleadoNombre:empleadoNombre.trim(),equipoId,sessionId});
  };

  return(
    <div style={S.root}>
      <div style={{...S.nav,borderColor:accentColor}}>
        <button style={S.navBtn} onClick={onBack}>← Volver</button>
        <div style={{flex:1,color:accentColor,fontWeight:900,fontSize:15,letterSpacing:1}}>
          {actividad==="conteo"?"📋 CONTEO":"📦 RECEPCIÓN"}
        </div>
      </div>
      <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:16}}>
        <div style={S.card}>
          <label style={S.lbl}>Tu nombre</label>
          <input style={S.inp} placeholder="Escribe tu nombre"
            value={empleadoNombre} onChange={e=>{setEmpleadoNombre(e.target.value);setError("");}}/>
          {empleadosGuardados.length>0&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:10}}>
              {empleadosGuardados.filter(n=>!empleadoNombre||n.toLowerCase().includes(empleadoNombre.toLowerCase())).slice(0,8).map(n=>(
                <button key={n} style={{background:empleadoNombre===n?"#2A3A50":"#1C2030",border:"1px solid "+(empleadoNombre===n?accentColor:"#3A3D4A"),color:empleadoNombre===n?accentColor:"#C0C4D8",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}
                  onClick={()=>{setEmpleadoNombre(n);setError("");}}>
                  {n}
                </button>
              ))}
            </div>
          )}
        </div>

        <div>
          <label style={S.secLbl}>Cliente</label>
          <ClienteSelector onSelect={k=>{setClienteKey(k);setError("");}} selectedKey={clienteKey}/>
        </div>

        {actividad==="conteo"&&clienteKey&&(
          <div style={S.card}>
            <label style={S.lbl}>Equipo</label>
            {eqList.length===0?(
              <p style={{color:"#6A6F82",fontSize:13,textAlign:"center",padding:"12px 0"}}>No hay equipos configurados para este cliente.<br/>El supervisor debe crearlos en el panel.</p>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {eqList.map(([id,eq])=>(
                  <button key={id} style={{background:equipoId===id?"#1C2A40":"#0E1016",border:"2px solid "+(equipoId===id?accentColor:"#3A3D4A"),borderRadius:12,padding:"14px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",fontFamily:"inherit"}}
                    onClick={()=>{setEquipoId(id);setError("");}}>
                    <div style={{textAlign:"left"}}>
                      <div style={{color:"#FFFFFF",fontWeight:900,fontSize:16}}>{eq.nombre}</div>
                      <div style={{color:"#8A8FA8",fontSize:11,marginTop:3}}>
                        {(eq.integrantes||[]).map(p=>p.rol+": "+(p.nombre||"—")).join(" · ")}
                      </div>
                    </div>
                    {equipoId===id&&<span style={{color:accentColor,fontSize:18}}>✓</span>}
                  </button>
                ))}
              </div>
            )}
          </div>
        )}

        {error&&<p style={{color:"#FF5555",fontWeight:800,fontSize:13,textAlign:"center"}}>{error}</p>}

        <button style={{...S.solidBtn,background:accentColor,color:"#000",fontSize:16}} onClick={handleConfirm}>
          Continuar →
        </button>
      </div>
    </div>
  );
}

// ── APP PRINCIPAL ─────────────────────────────────────────────────────────────
function App(){
  // flow: "activity" | "cliente-empleado" | "conteo" | "recepcion" | "supervisor-pin" | "supervisor"
  const [flow,setFlow]=React.useState("activity");
  const [actividad,setActividad]=React.useState(null);
  const [session,setSession]=React.useState(null); // {clienteKey, empleadoNombre, equipoId, sessionId}

  const handleActivity=act=>{
    if(act==="supervisor"){setFlow("supervisor-pin");}
    else{setActividad(act);setFlow("cliente-empleado");}
  };

  const handleSessionConfirm=async(sess)=>{
    setSession(sess);
    setFlow(actividad);
  };

  const handleExit=async()=>{
    // Deregister employee on exit
    if(session?.sessionId) await fbDel("empleados_activos/"+session.sessionId);
    setSession(null);setActividad(null);setFlow("activity");
  };

  if(flow==="activity") return <ActivitySelector onSelect={handleActivity}/>;
  if(flow==="cliente-empleado") return(
    <ClienteEmpleadoSelector actividad={actividad}
      onConfirm={handleSessionConfirm} onBack={()=>setFlow("activity")}/>
  );
  if(flow==="conteo") return(
    <ContadorView equipoId={session.equipoId} equipo={{}} clienteKey={session.clienteKey}
      empleadoNombre={session.empleadoNombre} onBack={handleExit}/>
  );
  if(flow==="recepcion") return(
    <RecepcionistaView clienteKey={session.clienteKey}
      empleadoNombre={session.empleadoNombre} sessionId={session.sessionId} onBack={handleExit}/>
  );
  if(flow==="supervisor-pin") return(
    <PinScreen titulo="PIN ADMINISTRADOR" emoji="🔐" accentColor="#C8AEFF"
      pinCorrecto={SUPERVISOR_PIN} onSuccess={()=>setFlow("supervisor")} onBack={()=>setFlow("activity")}/>
  );
  if(flow==="supervisor") return(
    <SupervisorView onBack={()=>setFlow("activity")}/>
  );
  return null;
}

// ── CONTADOR ──────────────────────────────────────────────────────────────────
function ContadorView({equipoId,clienteKey,empleadoNombre,onBack}){
  const cliente=CLIENTES[clienteKey]||Object.values(CLIENTES)[0];
  const [equipo,setEquipo]=React.useState({});
  const [ubicacion,setUbicacion]=React.useState("");
  const [skus,setSkus]=React.useState([{id:uid(),sku:"",cantidad:""}]);
  const [nota,setNota]=React.useState("");
  const [errors,setErrors]=React.useState({});
  const [saved,setSaved]=React.useState(false);
  const [saving,setSaving]=React.useState(false);
  const [totalReg,setTotalReg]=React.useState(0);
  const [lastReg,setLastReg]=React.useState(null);
  const [timerStart,setTimerStart]=React.useState(null);
  const [timerSecs,setTimerSecs]=React.useState(0);
  const timerRef=React.useRef(null);

  React.useEffect(()=>{
    fbGet(eqPath(clienteKey)+"/"+equipoId).then(d=>{ if(d) setEquipo(d); });
    const off=fbOn("registros/"+equipoId,data=>{
      const regs=data?Object.values(data):[];
      setTotalReg(regs.length);
      if(regs.length>0) setLastReg(regs.sort((a,b)=>(b.ts||0)-(a.ts||0))[0]);
    });
    return()=>{off();clearInterval(timerRef.current);};
  },[equipoId,clienteKey]);

  const startTimer=()=>{
    if(!timerStart){
      setTimerStart(Date.now());
      timerRef.current=setInterval(()=>setTimerSecs(s=>s+1),1000);
    }
  };
  const resetTimer=()=>{clearInterval(timerRef.current);setTimerStart(null);setTimerSecs(0);};
  const addSku=()=>setSkus(s=>[...s,{id:uid(),sku:"",cantidad:""}]);
  const removeSku=id=>setSkus(s=>s.filter(x=>x.id!==id));
  const updateSku=(id,f,v)=>setSkus(s=>s.map(x=>x.id===id?{...x,[f]:v}:x));

  const validate=()=>{
    const e={};
    if(!ubicacion.trim()) e.ubicacion="Requerida";
    skus.forEach((s,i)=>{
      if(!s.sku.trim()) e["sku_"+i]="SKU requerido";
      if(s.cantidad===""||isNaN(s.cantidad)||Number(s.cantidad)<0) e["cant_"+i]="Inválida";
    });
    return e;
  };

  const handleGuardar=async()=>{
    const e=validate(); if(Object.keys(e).length){setErrors(e);return;}
    const durSecs=timerStart?Math.round((Date.now()-timerStart)/1000):0;
    const durMins=parseFloat((durSecs/60).toFixed(2));
    const totalPiezas=skus.reduce((s,x)=>s+Number(x.cantidad||0),0);
    setSaving(true);
    await fbPush("registros/"+equipoId,{
      ubicacion:ubicacion.trim().toUpperCase(),
      skus:skus.map(s=>({sku:s.sku.trim().toUpperCase(),cantidad:Number(s.cantidad)})),
      nota:nota.trim(),hora:ts(),ts:Date.now(),
      duracionSecs:durSecs,duracionMins:durMins,totalPiezas,
      empleado:empleadoNombre,
    });
    setSaving(false); resetTimer();
    setUbicacion("");setSkus([{id:uid(),sku:"",cantidad:""}]);setNota("");setErrors({});
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const fmtTimer=()=>{
    const h=Math.floor(timerSecs/3600);
    const m=Math.floor((timerSecs%3600)/60);
    const s=timerSecs%60;
    return (h>0?String(h).padStart(2,"0")+":":"")+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  };

  return(
    <div style={S.root}>
      <div style={{...S.nav,borderColor:cliente.color}}>
        <button style={S.navBtn} onClick={onBack}>← Salir</button>
        <div style={{flex:1}}>
          <div style={{color:cliente.color,fontWeight:900,fontSize:14,letterSpacing:1}}>{equipo.nombre||"Equipo"} · {cliente.nombre}</div>
          <div style={{color:"#A0A4B8",fontSize:11,marginTop:1}}>👤 {empleadoNombre}</div>
        </div>
        <div style={{display:"flex",gap:14,alignItems:"center"}}>
          {timerStart&&(
            <div style={{textAlign:"center"}}>
              <div style={{color:"#FFD166",fontWeight:900,fontSize:16,fontFamily:"monospace"}}>{fmtTimer()}</div>
              <div style={{color:"#FFD16688",fontSize:9,fontWeight:700}}>en curso</div>
            </div>
          )}
          <div style={{textAlign:"center"}}>
            <div style={{color:"#FFFFFF",fontWeight:900,fontSize:18}}>{totalReg}</div>
            <div style={{color:"#C0C4D8",fontSize:10,fontWeight:600}}>pos.</div>
          </div>
        </div>
      </div>

      <div style={{padding:"14px"}}>
        <div style={S.card}>
          <label style={S.lbl}>Ubicación</label>
          <input style={{...S.inp,...(errors.ubicacion?S.inpErr:{})}}
            placeholder={cliente.ubicacionPlaceholder} value={ubicacion}
            onChange={e=>{setUbicacion(e.target.value);setErrors(er=>({...er,ubicacion:null}));}}/>
          <span style={S.hint}>{cliente.ubicacionHint}</span>
          {errors.ubicacion&&<span style={S.errMsg}>{errors.ubicacion}</span>}

          <div style={{marginTop:18,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <label style={{...S.lbl,margin:0}}>SKUs en esta posición</label>
            <button style={{background:cliente.color,border:"none",color:"#000",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}
              onClick={addSku}>+ Agregar SKU</button>
          </div>

          {skus.map((s,i)=>(
            <div key={s.id} style={{display:"flex",gap:8,marginBottom:10,alignItems:"flex-start"}}>
              <div style={{flex:2}}>
                <div style={{color:"#D0D4E8",fontSize:11,fontWeight:700,marginBottom:4}}>SKU {i+1}</div>
                <input style={{...S.inp,...(errors["sku_"+i]?S.inpErr:{})}}
                  placeholder={cliente.skuPlaceholder} value={s.sku}
                  onChange={e=>{updateSku(s.id,"sku",e.target.value);setErrors(er=>({...er,["sku_"+i]:null}));startTimer();}}/>
                {errors["sku_"+i]&&<span style={S.errMsg}>{errors["sku_"+i]}</span>}
              </div>
              <div style={{flex:1}}>
                <div style={{color:"#D0D4E8",fontSize:11,fontWeight:700,marginBottom:4}}>Cant.</div>
                <input style={{...S.inp,textAlign:"center",fontSize:22,fontWeight:900,...(errors["cant_"+i]?S.inpErr:{})}}
                  placeholder="0" type="number" inputMode="numeric" min="0" value={s.cantidad}
                  onChange={e=>{updateSku(s.id,"cantidad",e.target.value);setErrors(er=>({...er,["cant_"+i]:null}));}}
                  onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addSku();}}}/>
                {errors["cant_"+i]&&<span style={S.errMsg}>{errors["cant_"+i]}</span>}
              </div>
              {skus.length>1&&(
                <button style={{background:"#2A1515",border:"2px solid #FF5555",color:"#FF5555",borderRadius:8,padding:"8px 10px",fontSize:14,cursor:"pointer",fontFamily:"inherit",alignSelf:"flex-end",marginBottom:1}}
                  onClick={()=>removeSku(s.id)}>✕</button>
              )}
            </div>
          ))}

          <label style={{...S.lbl,marginTop:8}}>Nota (daño, observación)</label>
          <input style={S.inp} placeholder="Opcional" value={nota} onChange={e=>setNota(e.target.value)}/>

          <button style={{...S.solidBtn,background:saved?"#00E6A8":cliente.color,color:"#000",marginTop:18,fontSize:15,opacity:saving?0.7:1}}
            onClick={handleGuardar} disabled={saving}>
            {saving?"Guardando...":saved?"✓ Posición guardada":"Registrar posición"}
          </button>
        </div>

        {lastReg&&(
          <div style={{background:"#1C2030",border:"2px solid "+cliente.color+"66",borderRadius:12,padding:"12px 14px",marginTop:12}}>
            <div style={{color:"#C0C4D8",fontSize:10,fontWeight:700,letterSpacing:2,marginBottom:6}}>ÚLTIMO — {lastReg.hora}</div>
            <div style={{color:cliente.color,fontWeight:900,fontSize:15}}>{lastReg.ubicacion}</div>
            {(lastReg.skus||[]).map((s,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
                <span style={{color:"#E0E4F8",fontSize:13,fontWeight:600}}>{s.sku}</span>
                <span style={{color:"#FFFFFF",fontWeight:900,fontSize:14}}>{s.cantidad} uds</span>
              </div>
            ))}
          </div>
        )}
        <p style={{color:"#6A6F82",fontSize:11,textAlign:"center",marginTop:12,fontWeight:600}}>Registros visibles para el administrador en tiempo real</p>
      </div>
    </div>
  );
}

// ── RECEPCIONISTA ─────────────────────────────────────────────────────────────
function RecepcionistaView({clienteKey,empleadoNombre,sessionId,onBack}){
  const accentColor="#69CAFF";
  const [contenedores,setContenedores]=React.useState({});
  const [vista,setVista]=React.useState("lista"); // lista | nuevo | detalle
  const [selectedId,setSelectedId]=React.useState(null);
  const [confirmDel,setConfirmDel]=React.useState(null);
  const [numCont,setNumCont]=React.useState("");
  const [transportista,setTransportista]=React.useState("");
  const [clienteContKey,setClienteContKey]=React.useState(clienteKey||"");
  const [skus,setSkus]=React.useState([{id:uid(),sku:"",esperado:"",recibido:"",danado:"",notaDano:""}]);
  const [obs,setObs]=React.useState("");
  const [saving,setSaving]=React.useState(false);
  const [saved,setSaved]=React.useState(false);
  const [showCopy,setShowCopy]=React.useState(false);
  const [copied,setCopied]=React.useState(false);

  React.useEffect(()=>{
    const off=fbOn("contenedores",data=>setContenedores(data||{}));
    return off;
  },[]);

  const addSku=()=>setSkus(s=>[...s,{id:uid(),sku:"",esperado:"",recibido:"",danado:"",notaDano:""}]);
  const removeSku=id=>setSkus(s=>s.filter(x=>x.id!==id));
  const updateSku=(id,f,v)=>setSkus(s=>s.map(x=>x.id===id?{...x,[f]:v}:x));
  const resetForm=()=>{setNumCont("");setTransportista("");setObs("");setSkus([{id:uid(),sku:"",esperado:"",recibido:"",danado:"",notaDano:""}]);setSaved(false);};

  const handleGuardar=async()=>{
    if(!numCont.trim()||!clienteContKey) return;
    setSaving(true);
    await fbPush("contenedores",{
      cliente:clienteContKey,clienteNombre:CLIENTES[clienteContKey]?.nombre||clienteContKey,
      numContenedor:numCont.trim().toUpperCase(),transportista:transportista.trim(),
      fecha:dateStr(),hora:ts(),ts:Date.now(),empleado:empleadoNombre,
      skus:skus.filter(s=>s.sku.trim()).map(s=>({
        sku:s.sku.trim().toUpperCase(),esperado:Number(s.esperado)||0,
        recibido:Number(s.recibido)||0,danado:Number(s.danado)||0,
        notaDano:s.notaDano.trim(),diferencia:(Number(s.recibido)||0)-(Number(s.esperado)||0),
      })),
      obsGeneral:obs.trim(),
    });
    setSaving(false);setSaved(true);
    setTimeout(()=>{resetForm();setVista("lista");},1500);
  };

  const deleteCont=async()=>{
    await fbDel("contenedores/"+confirmDel);
    setConfirmDel(null);
    if(selectedId===confirmDel){setSelectedId(null);setVista("lista");}
  };

  const buildCSV=(cont)=>{
    if(!cont) return "";
    const header="SKU,Esperado,Recibido,Danado,Diferencia,Nota_Dano";
    const rows=(cont.skus||[]).map(s=>s.sku+","+s.esperado+","+s.recibido+","+(s.danado||0)+","+s.diferencia+',"'+(s.notaDano||"").replace(/"/g,'""')+'"');
    const lines=["Contenedor: "+cont.numContenedor,"Cliente: "+cont.clienteNombre,
      "Fecha: "+cont.fecha+" "+cont.hora,"Transportista: "+(cont.transportista||"—"),
      "Recepcionista: "+(cont.empleado||"—"),"Observaciones: "+(cont.obsGeneral||"—"),
      "",header].concat(rows);
    return lines.join("\n");
  };

  const exportCSV=(cont)=>{
    const text=buildCSV(cont); if(!text) return;
    try{const blob=new Blob([text],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="contenedor_"+cont.numContenedor+"_"+cont.fecha.replace(/\//g,"-")+".csv";a.click();}catch(e){console.error(e);}
  };
  const handleCopy=(cont)=>{
    const text=buildCSV(cont); if(!text) return;
    if(navigator.clipboard) navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
    else{const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);setCopied(true);setTimeout(()=>setCopied(false),2000);}
  };

  const contList=Object.entries(contenedores).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0));
  const sel=selectedId?contenedores[selectedId]:null;
  const hasDanos=c=>(c.skus||[]).some(s=>s.danado>0||s.notaDano);
  const hasDifs=c=>(c.skus||[]).some(s=>s.diferencia!==0);

  return(
    <div style={S.root}>
      {confirmDel&&<ConfirmModal title="¿Eliminar registro?" message="Se eliminará el registro de este contenedor. Esta acción no se puede deshacer." confirmLabel="Sí, eliminar" onConfirm={deleteCont} onCancel={()=>setConfirmDel(null)}/>}
      {showCopy&&sel&&(
        <div style={{position:"fixed",inset:0,background:"#000000EE",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#1C2030",border:"2px solid #4A4D5A",borderRadius:18,padding:"22px 18px",width:"100%",maxWidth:480}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <p style={{color:"#FFFFFF",fontSize:14,fontWeight:800}}>Reporte CSV</p>
              <button style={{...S.navBtn,fontSize:11}} onClick={()=>setShowCopy(false)}>✕ Cerrar</button>
            </div>
            <textarea readOnly style={{...S.inp,height:180,resize:"none",fontSize:11,lineHeight:1.6,fontFamily:"monospace"}} value={buildCSV(sel)} onFocus={e=>e.target.select()}/>
            <button style={{...S.solidBtn,background:copied?"#00E6A8":accentColor,color:"#000",marginTop:10,fontSize:14}} onClick={()=>handleCopy(sel)}>
              {copied?"✓ Copiado":"📋 Copiar reporte"}
            </button>
          </div>
        </div>
      )}

      <div style={{...S.nav,borderColor:accentColor}}>
        <button style={S.navBtn} onClick={vista==="lista"?onBack:()=>{setVista("lista");setSelectedId(null);}}>← {vista==="lista"?"Salir":"Volver"}</button>
        <div style={{flex:1}}>
          <div style={{color:accentColor,fontWeight:900,fontSize:14,letterSpacing:1}}>RECEPCIÓN</div>
          <div style={{color:"#A0A4B8",fontSize:11}}>👤 {empleadoNombre}</div>
        </div>
        {vista==="lista"&&<button style={{...S.navBtn,background:accentColor,color:"#000",border:"none",fontWeight:900}} onClick={()=>{resetForm();setVista("nuevo");}}>+ Nuevo</button>}
      </div>

      {/* LISTA */}
      {vista==="lista"&&(
        <div style={{padding:"14px",display:"flex",flexDirection:"column",gap:10}}>
          <span style={S.secLbl}>Contenedores registrados ({contList.length})</span>
          {contList.length===0&&(
            <div style={{border:"2px dashed #3A3D4A",borderRadius:12,padding:"28px",textAlign:"center"}}>
              <p style={{color:"#6A6F82",fontSize:13}}>Sin contenedores registrados aún</p>
            </div>
          )}
          {contList.map(([id,cont])=>{
            const c=CLIENTES[cont.cliente];
            return(
              <div key={id} style={{background:"#1C2030",border:"2px solid "+(hasDanos(cont)?"#FF5555":hasDifs(cont)?"#FFD166":"#3A3D4A"),borderRadius:14,padding:"13px",cursor:"pointer"}}
                onClick={()=>{setSelectedId(id);setVista("detalle");}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{color:"#FFFFFF",fontWeight:900,fontSize:15}}>📦 {cont.numContenedor}</div>
                    <div style={{color:c?c.color:"#C8AEFF",fontSize:12,fontWeight:700,marginTop:2}}>{cont.clienteNombre}</div>
                    <div style={{color:"#6A6F82",fontSize:11,marginTop:2}}>{cont.fecha} · {cont.hora}</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end"}}>
                    {hasDanos(cont)&&<span style={{fontSize:10,fontWeight:800,color:"#FF5555",background:"#FF555520",border:"1px solid #FF5555",borderRadius:6,padding:"2px 7px"}}>⚠ Daños</span>}
                    {hasDifs(cont)&&!hasDanos(cont)&&<span style={{fontSize:10,fontWeight:800,color:"#FFD166",background:"#FFD16620",border:"1px solid #FFD166",borderRadius:6,padding:"2px 7px"}}>≠ Difs.</span>}
                    {!hasDanos(cont)&&!hasDifs(cont)&&<span style={{fontSize:10,fontWeight:800,color:"#00E6A8",background:"#00E6A820",border:"1px solid #00E6A8",borderRadius:6,padding:"2px 7px"}}>✓ OK</span>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* DETALLE */}
      {vista==="detalle"&&sel&&(
        <div style={{padding:"14px",display:"flex",flexDirection:"column",gap:12}}>
          <div style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <div style={{color:accentColor,fontWeight:900,fontSize:18}}>📦 {sel.numContenedor}</div>
                <div style={{color:CLIENTES[sel.cliente]?.color||"#C8AEFF",fontSize:13,fontWeight:700,marginTop:2}}>{sel.clienteNombre}</div>
                <div style={{color:"#8A8FA8",fontSize:11,marginTop:2}}>{sel.fecha} · {sel.hora}</div>
                {sel.transportista&&<div style={{color:"#C0C4D8",fontSize:11,marginTop:2}}>🚛 {sel.transportista}</div>}
                {sel.empleado&&<div style={{color:"#C0C4D8",fontSize:11,marginTop:2}}>👤 {sel.empleado}</div>}
              </div>
              <button style={{background:"#2A1515",border:"2px solid #FF5555",color:"#FF5555",borderRadius:8,padding:"7px 11px",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}
                onClick={()=>setConfirmDel(selectedId)}>🗑 Eliminar</button>
            </div>
            {sel.obsGeneral&&<div style={{background:"#0E1016",border:"1px solid #3A3D4A",borderRadius:8,padding:"9px 12px"}}><span style={{color:"#A0A4B8",fontSize:11,fontWeight:700}}>OBS: </span><span style={{color:"#E0E4F8",fontSize:12}}>{sel.obsGeneral}</span></div>}
          </div>
          {(sel.skus||[]).map((s,i)=>{
            const st=s.danado>0?"dano":s.diferencia>0?"exceso":s.diferencia<0?"faltante":"ok";

                  <span style={{color:"#FFFFFF",fontWeight:900,fontSize:14}}>{s.sku}</span>
                  <span style={{fontSize:10,fontWeight:800,color:cfg.color,border:"1px solid "+cfg.color,borderRadius:6,padding:"2px 7px"}}>{cfg.label}</span>
                </div>
                <div style={{display:"flex",gap:6}}>
                  {[["Esperado",s.esperado,"#C0C4D8"],["Recibido",s.recibido,"#FFFFFF"],["Dañado",s.danado,"#FF5555"],["Diferencia",(s.diferencia>0?"+":"")+s.diferencia,s.diferencia===0?"#00E6A8":s.diferencia>0?"#FFD166":"#FF9955"]].map(([l,v,c])=>(
                    <div key={l} style={{flex:1,background:"#0E1016",border:"1px solid #2A2D3A",borderRadius:8,padding:"7px",textAlign:"center"}}>
                      <div style={{fontSize:9,color:"#6A6F82",fontWeight:700,letterSpacing:1,marginBottom:3}}>{l.toUpperCase()}</div>

                  ))}
                </div>
                {s.notaDano&&<div style={{marginTop:7,background:"#200F0F",border:"1px solid #FF555544",borderRadius:7,padding:"7px 9px",color:"#FF9955",fontSize:11}}>⚠ {s.notaDano}</div>}
              </div>
            );
          })}
          <div style={{display:"flex",gap:8}}>
            <button style={{...S.solidBtn,background:accentColor,color:"#000",fontSize:13}} onClick={()=>exportCSV(sel)}>↓ Descargar CSV</button>
            <button style={{...S.solidBtn,background:"#2A2D3A",border:"2px solid #6A6F82",color:"#FFFFFF",fontSize:13}} onClick={()=>setShowCopy(true)}>📋 Copiar</button>
          </div>
        </div>
      )}

      {/* NUEVO */}
      {vista==="nuevo"&&(
        <div style={{padding:"14px",display:"flex",flexDirection:"column",gap:12}}>
          <div style={S.card}>
            <label style={S.lbl}>Cliente</label>
            <ClienteSelector onSelect={setClienteContKey} selectedKey={clienteContKey}/>
            <label style={{...S.lbl,marginTop:14}}>N° de Contenedor / Sello</label>
            <input style={S.inp} placeholder="Ej: CONT-2024-001" value={numCont} onChange={e=>setNumCont(e.target.value)}/>
            <label style={{...S.lbl,marginTop:12}}>Transportista (opcional)</label>
            <input style={S.inp} placeholder="Empresa o conductor" value={transportista} onChange={e=>setTransportista(e.target.value)}/>
          </div>
          <div style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <label style={{...S.lbl,margin:0}}>Mercancía recibida</label>
              <button style={{background:accentColor,border:"none",color:"#000",borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}} onClick={addSku}>+ SKU</button>
            </div>
            {skus.map((s,i)=>(
              <div key={s.id} style={{background:"#0E1016",border:"2px solid #2A2D3A",borderRadius:11,padding:"11px",marginBottom:9}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:9}}>
                  <input style={{...S.inp,flex:1,fontSize:13}} placeholder="SKU o código de barras" value={s.sku} onChange={e=>updateSku(s.id,"sku",e.target.value)}/>
                  {skus.length>1&&<button style={{background:"#2A1515",border:"2px solid #FF5555",color:"#FF5555",borderRadius:8,padding:"7px 9px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>removeSku(s.id)}>✕</button>}
                </div>
                <div style={{display:"flex",gap:7,marginBottom:7}}>
                  {[["esperado","Esperado"],["recibido","Recibido"],["danado","Dañado"]].map(([f,l])=>(
                    <div key={f} style={{flex:1}}>
                      <div style={{color:"#A0A4B8",fontSize:9,fontWeight:700,letterSpacing:1,marginBottom:4}}>{l.toUpperCase()}</div>
                      <input style={{...S.inp,textAlign:"center",fontSize:18,fontWeight:900}} type="number" inputMode="numeric" min="0" placeholder="0" value={s[f]} onChange={e=>updateSku(s.id,f,e.target.value)}/>
                    </div>
                  ))}
                </div>
                {Number(s.danado)>0&&(
                  <input style={{...S.inp,fontSize:12}} placeholder="Describe el daño..." value={s.notaDano} onChange={e=>updateSku(s.id,"notaDano",e.target.value)}/>
                )}
              </div>
            ))}
          </div>
          <div style={S.card}>
            <label style={S.lbl}>Observaciones generales</label>
            <input style={S.inp} placeholder="Condición del sello, temperatura, incidencias..." value={obs} onChange={e=>setObs(e.target.value)}/>
          </div>
          <button style={{...S.solidBtn,background:saved?"#00E6A8":accentColor,color:"#000",fontSize:15,opacity:saving?0.7:1}}
            onClick={handleGuardar} disabled={saving||!numCont.trim()||!clienteContKey}>
            {saving?"Guardando...":saved?"✓ Contenedor registrado":"Registrar contenedor"}
          </button>
        </div>
      )}
    </div>
  );
}

// ── SUPERVISOR ────────────────────────────────────────────────────────────────
function SupervisorView({onBack}){
  const [fbData,setFbData]=React.useState({});
  const [equiposPorCliente,setEquiposPorCliente]=React.useState({});
  const [empleadosActivos,setEmpleadosActivos]=React.useState({});
  const [clienteKey,setClienteKey]=React.useState("");
  const [terceros,setTerceros]=React.useState({});
  const [filter,setFilter]=React.useState("all");
  const [saving,setSaving]=React.useState({});
  const [showCopy,setShowCopy]=React.useState(false);
  const [copied,setCopied]=React.useState(false);
  const [lastUpdate,setLastUpdate]=React.useState(null);
  const [refreshing,setRefreshing]=React.useState(false);
  const [editModal,setEditModal]=React.useState(null);
  const [editForm,setEditForm]=React.useState({});
  const [confirmDel,setConfirmDel]=React.useState(null);
  const [confirmDelTeam,setConfirmDelTeam]=React.useState(null);
  const [confirmReset,setConfirmReset]=React.useState(false);
  const [vistaPanel,setVistaPanel]=React.useState("empleados"); // empleados | conteo | equipos | historial
  const [historial,setHistorial]=React.useState([]);
  const [histLoading,setHistLoading]=React.useState(false);
  const [newTeamName,setNewTeamName]=React.useState("");
  const [listaEmpleados,setListaEmpleados]=React.useState([]);
  const [confirmDelEmp,setConfirmDelEmp]=React.useState(null);

  const fetchAll=React.useCallback(async()=>{
    const [data,eqs,activos,lista]=await Promise.all([
      fbGet("/"),
      clienteKey?fbGet(eqPath(clienteKey)):Promise.resolve({}),
      fbGet("empleados_activos"),
      fbGet("empleados"),
    ]);
    setFbData(data||{});
    setEquiposPorCliente(prev=>({...prev,[clienteKey]:eqs||{}}));
    setEmpleadosActivos(activos||{});
    setListaEmpleados(lista?Object.entries(lista):[]);
    setLastUpdate(new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit",second:"2-digit"}));
  },[clienteKey]);

  React.useEffect(()=>{
    const offRoot=fbOn("/",data=>{
      setFbData(data||{});
      setLastUpdate(new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit",second:"2-digit"}));
    });
    const offActivos=fbOn("empleados_activos",data=>setEmpleadosActivos(data||{}));
    const offLista=fbOn("empleados",data=>setListaEmpleados(data?Object.entries(data):[]));
    const poll=setInterval(fetchAll,5000);
    return()=>{offRoot();offActivos();offLista();clearInterval(poll);};
  },[fetchAll]);

  React.useEffect(()=>{
    if(!clienteKey) return;
    const off=fbOn(eqPath(clienteKey),data=>{
      setEquiposPorCliente(prev=>({...prev,[clienteKey]:data||{}}));
    });
    return off;
  },[clienteKey]);

  const equipos=equiposPorCliente[clienteKey]||{};
  const eqIds=Object.keys(equipos);
  const cross=buildCrossMap(equipos,fbData.registros,fbData.validaciones);
  const counts=cross.reduce((acc,r)=>{const s=getStatus(r,eqIds);acc[s]=(acc[s]||0)+1;return acc;},{});
  const filtered=filter==="all"?cross:cross.filter(r=>getStatus(r,eqIds)===filter);
  const activosList=Object.values(empleadosActivos);

  // Team management
  const ep=path=>eqPath(clienteKey)+"/"+path;
  const addTeam=async()=>{
    if(!newTeamName.trim()||!clienteKey) return;
    const id=uid();
    await fbSet(ep(id),{nombre:newTeamName.trim(),integrantes:ROLES_NORMAL.map(r=>({rol:r,nombre:""})),tipo:"normal"});
    setNewTeamName("");
  };
  const deleteTeam=async id=>{await fbDel(ep(id));await fbDel("registros/"+id);setConfirmDelTeam(null);};
  const updInt=async(tid,idx,f,v)=>{
    const eq=equipos[tid];if(!eq)return;
    const ints=[...(eq.integrantes||[])];ints[idx]={...ints[idx],[f]:v};
    await fbSet(ep(tid+"/integrantes"),ints);
  };
  const addInt=async(tid,rol)=>{
    const eq=equipos[tid];if(!eq)return;
    await fbSet(ep(tid+"/integrantes"),(eq.integrantes||[]).concat([{rol,nombre:""}]));
  };
  const remInt=async(tid,idx)=>{
    const eq=equipos[tid];if(!eq)return;
    await fbSet(ep(tid+"/integrantes"),(eq.integrantes||[]).filter((_,i)=>i!==idx));
  };
  const setTipoConteo=async(tid,tipo)=>{
    const roles=tipo==="auditoria"?ROLES_AUDITORIA:ROLES_NORMAL;
    await fbSet(ep(tid+"/integrantes"),roles.map(r=>({rol:r,nombre:""})));
    await fbSet(ep(tid+"/tipo"),tipo);
  };

  // Edit/delete registros
  const openEdit=(row,eqId)=>{
    const d=row.equipos[eqId];if(!d)return;
    setEditForm({eqId,fbId:d.fbId,ubicacion:row.ubicacion,sku:row.sku,cantidad:d.cantidad});
    setEditModal({row,eqId});
  };
  const saveEdit=async()=>{
    const{eqId,fbId,ubicacion,sku,cantidad}=editForm;
    const rec=await fbGet("registros/"+eqId+"/"+fbId);if(!rec)return;
    const newSkus=(rec.skus||[]).map(s=>s.sku.toUpperCase()===editModal.row.sku?{...s,sku:sku.toUpperCase(),cantidad:Number(cantidad)}:s);
    await fbSet("registros/"+eqId+"/"+fbId,{...rec,ubicacion:ubicacion.toUpperCase(),skus:newSkus});
    await fbDel("validaciones/"+makeKey(editModal.row.ubicacion,editModal.row.sku));
    setEditModal(null);await fetchAll();
  };
  const deleteRecord=async()=>{
    await fbDel("registros/"+confirmDel.eqId+"/"+confirmDel.fbId);
    await fbDel("validaciones/"+makeKey(confirmDel.ubicacion,confirmDel.sku));
    setConfirmDel(null);await fetchAll();
  };

  // Reset
  const handleReset=async()=>{
    const[snap,eqs]=await Promise.all([fbGet("/"),clienteKey?fbGet(eqPath(clienteKey)):Promise.resolve({})]);
    if(snap){
      const safeEqs=eqs||{};
      const cr=buildCrossMap(safeEqs,snap.registros||{},snap.validaciones||{});
      const ids=Object.keys(safeEqs);
      await fbSet("historial/sesion_"+Date.now(),{
        cliente:snap.sesion?.cliente||clienteKey||"DESCONOCIDO",
        fecha:dateStr(),hora:ts(),
        totalRegistros:cr.length,
        discrepancias:cr.filter(r=>getStatus(r,ids)==="discrepancia").length,
        validados:cr.filter(r=>getStatus(r,ids)==="validado").length,
        equipos:safeEqs,registros:snap.registros||{},validaciones:snap.validaciones||{},
      });
    }
    await fbDel("registros");await fbDel("validaciones");
    setConfirmReset(false);await fetchAll();
  };

  // CSV conteo
  const buildCSV=()=>{
    if(!cross.length) return "";
    const eqNames=eqIds.map(id=>equipos[id]?.nombre||id);
    const esc=v=>'"'+(v||"").toString().replace(/"/g,'""')+'"';
    const header=["Ubicacion","SKU",...eqNames.map(n=>"Cant_"+n),"Validado","Estatus",...eqNames.map(n=>"Mins_"+n),...eqNames.map(n=>"Piezas_"+n),...eqNames.map(n=>"Nota_"+n)].join(",");
    const body=cross.map(r=>{
      const vals=eqIds.map(id=>r.equipos[id]?.cantidad??"");
      const mins=eqIds.map(id=>r.equipos[id]?.duracionMins??"");
      const pzas=eqIds.map(id=>r.equipos[id]?.totalPiezas??"");
      const notas=eqIds.map(id=>esc(r.equipos[id]?.nota||""));
      return[r.ubicacion,r.sku,...vals,r.validado??"",getStatus(r,eqIds),...mins,...pzas,...notas].join(",");
    });
    return[header,...body].join("\n");
  };
  const exportCSV=()=>{
    const text=buildCSV();if(!text)return;
    try{const blob=new Blob([text],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="conteo_"+(clienteKey||"general")+"_"+new Date().toISOString().slice(0,10)+".csv";a.click();}catch(e){console.error(e);}
  };
  const handleCopy=()=>{
    const text=buildCSV();if(!text)return;
    if(navigator.clipboard) navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});
    else{const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);setCopied(true);setTimeout(()=>setCopied(false),2500);}
  };
  const handleValidar=async(key,cantidad)=>{
    setSaving(s=>({...s,[key]:true}));
    await fbSet("validaciones/"+key,Number(cantidad));
    setSaving(s=>({...s,[key]:false}));
  };

  const fetchHistorial=React.useCallback(async()=>{
    setHistLoading(true);
    const data=await fbGet("historial");
    if(data) setHistorial(Object.entries(data).map(([id,s])=>({id,...s})).sort((a,b)=>b.id.localeCompare(a.id)));
    else setHistorial([]);
    setHistLoading(false);
  },[]);
  React.useEffect(()=>{if(vistaPanel==="historial") fetchHistorial();},[vistaPanel,fetchHistorial]);

  const statBtns=[
    {k:"all",label:"Total",val:cross.length,color:"#D0D4E8"},
    {k:"ok",label:"✓ OK",val:counts.ok||0,color:"#00E6A8"},
    {k:"discrepancia",label:"⚠ Disc.",val:counts.discrepancia||0,color:"#FF5555"},
    {k:"incompleto",label:"◌ Inc.",val:counts.incompleto||0,color:"#D0D4E8"},
    {k:"validado",label:"✓✓ Val.",val:counts.validado||0,color:"#C8AEFF"},
  ];

  return(
    <div style={S.root}>
      {/* MODALS */}
      {editModal&&(
        <div style={{position:"fixed",inset:0,background:"#000000EE",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#1C2030",border:"2px solid #C8AEFF",borderRadius:18,padding:"22px 18px",width:"100%",maxWidth:400}}>
            <p style={{color:"#FFFFFF",fontSize:15,fontWeight:900,marginBottom:16}}>✏️ Editar — {equipos[editModal.eqId]?.nombre||editModal.eqId}</p>
            {[["Ubicación","ubicacion"],["SKU","sku"]].map(([l,f])=>(
              <div key={f} style={{marginBottom:10}}>
                <label style={S.lbl}>{l}</label>
                <input style={S.inp} value={editForm[f]} onChange={e=>setEditForm(fm=>({...fm,[f]:e.target.value}))}/>
              </div>
            ))}
            <label style={S.lbl}>Cantidad</label>
            <input style={{...S.inp,fontSize:20,fontWeight:900,textAlign:"center"}} type="number" inputMode="numeric" min="0" value={editForm.cantidad} onChange={e=>setEditForm(fm=>({...fm,cantidad:e.target.value}))}/>
            <div style={{display:"flex",gap:10,marginTop:16}}>
              <button style={{flex:1,background:"#2A2D3A",border:"2px solid #8A8FA8",color:"#FFFFFF",borderRadius:12,padding:"12px",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setEditModal(null)}>Cancelar</button>
              <button style={{flex:1,background:"#C8AEFF",border:"none",color:"#0A0820",borderRadius:12,padding:"12px",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}} onClick={saveEdit}>✓ Guardar</button>
            </div>
          </div>
        </div>
      )}
      {confirmDel&&<ConfirmModal title="¿Eliminar registro?" message={(equipos[confirmDel.eqId]?.nombre||confirmDel.eqId)+" · "+confirmDel.ubicacion+" · "+confirmDel.sku} confirmLabel="Sí, eliminar" onConfirm={deleteRecord} onCancel={()=>setConfirmDel(null)}/>}
      {confirmDelTeam&&<ConfirmModal title="¿Eliminar equipo?" message={"Se eliminará "+equipos[confirmDelTeam]?.nombre+" y todos sus registros."} confirmLabel="Sí, eliminar" onConfirm={()=>deleteTeam(confirmDelTeam)} onCancel={()=>setConfirmDelTeam(null)}/>}
      {confirmReset&&<ConfirmModal title="¿Reiniciar conteo?" message="Se borrarán todos los registros y validaciones. Los equipos se conservan." confirmLabel="Sí, reiniciar" onConfirm={handleReset} onCancel={()=>setConfirmReset(false)}/>}
      {confirmDelEmp&&<ConfirmModal title="¿Eliminar empleado?" message={"Se eliminará a "+confirmDelEmp.nombre+" del directorio."} confirmLabel="Sí, eliminar" onConfirm={async()=>{await fbDel("empleados/"+confirmDelEmp.id);setConfirmDelEmp(null);}} onCancel={()=>setConfirmDelEmp(null)}/>}
      {showCopy&&(
        <div style={{position:"fixed",inset:0,background:"#000000EE",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#1C2030",border:"2px solid #4A4D5A",borderRadius:18,padding:"22px 18px",width:"100%",maxWidth:480}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <p style={{color:"#FFFFFF",fontSize:14,fontWeight:800}}>Contenido CSV</p>
              <button style={{...S.navBtn,fontSize:11}} onClick={()=>setShowCopy(false)}>✕ Cerrar</button>
            </div>
            <textarea readOnly style={{...S.inp,height:160,resize:"none",fontSize:11,lineHeight:1.6,fontFamily:"monospace"}} value={buildCSV()} onFocus={e=>e.target.select()}/>
            <button style={{...S.solidBtn,background:copied?"#00E6A8":"#C8AEFF",color:"#000",marginTop:10,fontSize:14}} onClick={handleCopy}>{copied?"✓ Copiado":"📋 Copiar todo"}</button>
          </div>
        </div>
      )}

      {/* NAV */}
      <div style={{...S.nav,borderColor:"#C8AEFF"}}>
        <button style={S.navBtn} onClick={onBack}>← Salir</button>
        <div style={{flex:1,color:"#C8AEFF",fontWeight:900,fontSize:14,letterSpacing:1}}>ADMINISTRADOR</div>
        <button style={{...S.navBtn,color:"#C8AEFF",borderColor:"#C8AEFF",marginRight:6,fontSize:15}} onClick={async()=>{setRefreshing(true);await fetchAll();setRefreshing(false);}}>
          {refreshing?"...":"⟳"}
        </button>
        <button style={S.resetBtn} onClick={()=>setConfirmReset(true)}>↺</button>
      </div>
      <div style={{padding:"8px 16px 4px",color:"#6A6F82",fontSize:10,fontWeight:600}}>
        {lastUpdate?"Actualizado: "+lastUpdate:"Conectando..."}
      </div>

      {/* TABS */}
      <div style={{display:"flex",borderBottom:"2px solid #2E3240",overflowX:"auto"}}>
        {[["empleados","👥 Empleados"],["conteo","📋 Conteo"],["equipos","⚙️ Equipos"],["historial","🕐 Historial"]].map(([v,l])=>(
          <button key={v} onClick={()=>setVistaPanel(v)}
            style={{flex:1,minWidth:80,padding:"11px 6px",fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit",border:"none",whiteSpace:"nowrap",
              background:vistaPanel===v?"#1C2030":"transparent",
              color:vistaPanel===v?"#C8AEFF":"#6A6F82",
              borderBottom:vistaPanel===v?"3px solid #C8AEFF":"3px solid transparent"}}>
            {l}
          </button>
        ))}
      </div>

      {/* ── TAB: EMPLEADOS ── */}
      {vistaPanel==="empleados"&&(
        <div style={{padding:"14px",display:"flex",flexDirection:"column",gap:14}}>
          {/* Activos ahora */}
          <div>
            <span style={S.secLbl}>En actividad ahora ({activosList.length})</span>
            {activosList.length===0?(
              <div style={{border:"2px dashed #3A3D4A",borderRadius:12,padding:"20px",textAlign:"center"}}>
                <p style={{color:"#6A6F82",fontSize:13}}>Ningún empleado activo en este momento</p>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {activosList.map((emp,i)=>{
                  const isConteo=emp.actividad==="Conteo";
                  const color=isConteo?"#7B9FFF":"#69CAFF";
                  return(
                    <div key={i} style={{background:"#1C2030",border:"2px solid "+color+"55",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:36,height:36,borderRadius:"50%",background:color+"22",border:"2px solid "+color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                        {isConteo?"📋":"📦"}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{color:"#FFFFFF",fontWeight:900,fontSize:15}}>{emp.nombre}</div>
                        <div style={{color:color,fontSize:11,fontWeight:700,marginTop:2}}>{emp.actividad} · {emp.cliente}</div>
                      </div>
                      <div style={{color:"#6A6F82",fontSize:11}}>{emp.hora}</div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Directorio de empleados */}
          <div>
            <span style={S.secLbl}>Directorio ({listaEmpleados.length})</span>
            {listaEmpleados.length===0?(
              <p style={{color:"#6A6F82",fontSize:12,textAlign:"center"}}>Sin empleados registrados</p>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {listaEmpleados.map(([id,emp])=>(
                  <div key={id} style={{background:"#1C2030",border:"1px solid #2E3240",borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span style={{color:"#E0E4F8",fontSize:14,fontWeight:600}}>👤 {emp.nombre||emp}</span>
                    <button style={{background:"#2A1515",border:"1px solid #FF5555",color:"#FF5555",borderRadius:7,padding:"5px 10px",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}
                      onClick={()=>setConfirmDelEmp({id,nombre:emp.nombre||emp})}>✕</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── TAB: EQUIPOS ── */}
      {vistaPanel==="equipos"&&(
        <div style={{padding:"14px",display:"flex",flexDirection:"column",gap:12}}>
          <div>
            <label style={S.secLbl}>Cliente para configurar equipos</label>
            <ClienteSelector onSelect={setClienteKey} selectedKey={clienteKey}/>
          </div>
          {clienteKey&&(
            <>
              <div style={{display:"flex",gap:8}}>
                <input style={{...S.inp,flex:1}} placeholder="Nombre del nuevo equipo" value={newTeamName} onChange={e=>setNewTeamName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTeam()}/>
                <button style={{background:"#00E6A8",border:"none",color:"#000",borderRadius:10,padding:"0 16px",fontSize:13,fontWeight:900,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}} onClick={addTeam}>+ Nuevo</button>
              </div>
              {Object.keys(equipos).length===0&&(
                <div style={{border:"2px dashed #3A3D4A",borderRadius:12,padding:"20px",textAlign:"center"}}>
                  <p style={{color:"#6A6F82",fontSize:13}}>Sin equipos para este cliente. Agrega uno arriba.</p>
                </div>
              )}
              {Object.entries(equipos).map(([id,eq])=>(
                <div key={id} style={{...S.card}}>
                  <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
                    <input style={{...S.inp,flex:1,fontSize:15,fontWeight:900}} value={eq.nombre||""} placeholder="Nombre del equipo" onChange={e=>fbSet(ep(id+"/nombre"),e.target.value)}/>
                    <button style={{background:"#2A1515",border:"2px solid #FF5555",color:"#FF5555",borderRadius:8,padding:"7px 11px",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}} onClick={()=>setConfirmDelTeam(id)}>🗑 Quitar</button>
                  </div>
                  <label style={S.lbl}>Tipo de conteo</label>
                  <div style={{display:"flex",gap:8,marginBottom:12}}>
                    {[["normal","🔄 Normal"],["auditoria","🔍 Auditoría"]].map(([tipo,lbl])=>{
                      const act=eq.tipo===tipo||(!eq.tipo&&tipo==="normal");
                      return(<button key={tipo} onClick={()=>setTipoConteo(id,tipo)} style={{flex:1,padding:"8px",borderRadius:9,fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit",background:act?"#2A3A50":"#0E1016",border:"2px solid "+(act?"#7B9FFF":"#3A3D4A"),color:act?"#7B9FFF":"#6A6F82"}}>{lbl}</button>);
                    })}
                  </div>
                  <label style={S.lbl}>Integrantes</label>
                  {(eq.integrantes||[]).map((p,idx)=>(
                    <div key={idx} style={{display:"flex",gap:8,marginBottom:7,alignItems:"center"}}>
                      <div style={{background:"#0E1016",border:"1px solid #3A3D4A",borderRadius:7,padding:"8px 11px",fontSize:11,fontWeight:700,color:"#A0A4B8",minWidth:85,whiteSpace:"nowrap"}}>{p.rol}</div>
                      <input style={{...S.inp,flex:1,fontSize:13}} placeholder={"Nombre del "+p.rol} value={p.nombre||""} onChange={e=>updInt(id,idx,"nombre",e.target.value)}/>
                      <button style={{background:"#2A1515",border:"2px solid #FF5555",color:"#FF5555",borderRadius:7,padding:"7px 9px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>remInt(id,idx)}>✕</button>
                    </div>
                  ))}
                  <div style={{display:"flex",gap:8,marginTop:6}}>
                    {(eq.tipo==="auditoria"?ROLES_AUDITORIA:ROLES_NORMAL).map(rol=>(
                      <button key={rol} style={{flex:1,background:"transparent",border:"1px dashed #4A4D5A",color:"#8A8FA8",borderRadius:8,padding:"7px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>addInt(id,rol)}>+ {rol}</button>
                    ))}
                  </div>
                </div>
              ))}
            </>
          )}
        </div>
      )}

      {/* ── TAB: HISTORIAL ── */}
      {vistaPanel==="historial"&&(
        <div style={{padding:"14px",display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={S.secLbl}>Sesiones anteriores</span>
            <button style={{...S.navBtn,fontSize:11}} onClick={fetchHistorial}>⟳ Actualizar</button>
          </div>
          {histLoading&&<p style={{color:"#8A8FA8",textAlign:"center",marginTop:20,fontSize:13}}>Cargando...</p>}
          {!histLoading&&historial.length===0&&<p style={{color:"#8A8FA8",textAlign:"center",marginTop:20,fontSize:13}}>Sin sesiones anteriores</p>}
          {historial.map(s=>{
            const c=CLIENTES[s.cliente];
            return(
              <div key={s.id} style={{background:"#1C2030",border:"2px solid "+(c?c.color+"66":"#3A3D4A"),borderRadius:13,padding:"13px"}}>
                <div style={{color:c?c.color:"#C8AEFF",fontWeight:900,fontSize:14,marginBottom:3}}>{c?c.nombre:s.cliente}</div>
                <div style={{color:"#C0C4D8",fontSize:11,marginBottom:10}}>{s.fecha} · {s.hora}</div>
                <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                  {[{l:"Registros",v:s.totalRegistros||0,c:"#D0D4E8"},{l:"Disc.",v:s.discrepancias||0,c:"#FF5555"},{l:"Validados",v:s.validados||0,c:"#C8AEFF"}].map(st=>(
                    <div key={st.l} style={{background:"#0E1016",border:"1px solid "+st.c+"44",borderRadius:9,padding:"8px 12px",textAlign:"center",minWidth:70}}>
                      <div style={{fontSize:18,fontWeight:900,color:st.c}}>{st.v}</div>
                      <div style={{fontSize:9,color:"#8A8FA8",fontWeight:700,marginTop:2}}>{st.l}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── TAB: CONTEO ── */}
      {vistaPanel==="conteo"&&(
        <>
          {/* Cliente selector para conteo */}
          {!clienteKey?(
            <div style={{padding:"14px"}}>
              <label style={S.secLbl}>Selecciona cliente para ver el conteo</label>
              <ClienteSelector onSelect={setClienteKey} selectedKey={clienteKey}/>
            </div>
          ):(
            <>
              <div style={{padding:"10px 14px 0",display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1,color:CLIENTES[clienteKey]?.color||"#C8AEFF",fontWeight:800,fontSize:14}}>{CLIENTES[clienteKey]?.nombre}</div>
                <button style={{...S.cambiarBtn,fontSize:11}} onClick={()=>setClienteKey("")}>Cambiar</button>
              </div>
              <div style={{display:"flex",gap:6,padding:"10px 14px",overflowX:"auto"}}>
                {statBtns.map(s=>(
                  <button key={s.k} onClick={()=>setFilter(s.k)}
                    style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,border:"2px solid "+(filter===s.k?s.color:"#4A4D5A"),borderRadius:11,padding:"9px 11px",cursor:"pointer",fontFamily:"inherit",background:filter===s.k?s.color+"22":"#1C2030",minWidth:60,flexShrink:0}}>
                    <span style={{fontSize:20,fontWeight:900,color:s.color}}>{s.val}</span>
                    <span style={{fontSize:9,color:filter===s.k?s.color:"#C0C4D8",fontWeight:800}}>{s.label}</span>
                  </button>
                ))}
              </div>
              <div style={{padding:"0 14px 12px",display:"flex",gap:8}}>
                <button style={{...S.solidBtn,background:CLIENTES[clienteKey]?.color||"#C8AEFF",color:"#000",fontSize:13}} onClick={exportCSV}>↓ CSV</button>
                <button style={{...S.solidBtn,background:"#2A2D3A",border:"2px solid #6A6F82",color:"#FFFFFF",fontSize:13}} onClick={()=>setShowCopy(true)}>📋 Copiar</button>
              </div>
              <div style={{padding:"0 14px 60px",display:"flex",flexDirection:"column",gap:10}}>
                {filtered.length===0&&<p style={{color:"#A0A4B8",textAlign:"center",marginTop:32,fontSize:14,fontWeight:600}}>Sin registros aún</p>}
                {filtered.map(row=>{
                  const key=makeKey(row.ubicacion,row.sku);
                  const status=getStatus(row,eqIds);
                  const sc=STATUS_CFG[status];
                  return(
                    <div key={key} style={{background:"#1C2030",border:"2px solid "+sc.color,borderRadius:14,padding:"13px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:9,gap:8}}>
                        <div>
                          <div style={{color:CLIENTES[clienteKey]?.color||"#C8AEFF",fontWeight:900,fontSize:16}}>{row.ubicacion}</div>
                          <div style={{color:"#E0E4F8",fontSize:13,fontWeight:700,marginTop:2}}>{row.sku}</div>
                        </div>
                        <Badge status={status}/>
                      </div>
                      <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                        {eqIds.map(id=>{
                          const d=row.equipos[id];
                          return(
                            <div key={id} style={{flex:1,minWidth:75,background:"#0E1016",border:"2px solid "+(d?sc.color+"44":"#2A2D3A"),borderRadius:11,padding:"9px 7px",textAlign:"center"}}>
                              <div style={{fontSize:9,color:"#C0C4D8",letterSpacing:1,fontWeight:800,marginBottom:4}}>{equipos[id]?.nombre||id}</div>
                              <div style={{fontSize:26,fontWeight:900,color:d?"#FFFFFF":"#4A4D5A"}}>{d?.cantidad??"—"}</div>
                              {d?.duracionMins!=null&&<div style={{fontSize:9,color:"#FFD166",marginTop:2,fontWeight:700}}>⏱ {d.duracionMins}min</div>}
                              {d?.nota&&<div style={{fontSize:9,color:"#FF9955",marginTop:2}}>⚠ {d.nota}</div>}
                            </div>
                          );
                        })}
                        {row.validado!==null&&row.validado!==undefined&&(
                          <>
                            <div style={{color:"#6A6F82",fontSize:18,alignSelf:"center",fontWeight:900}}>→</div>
                            <div style={{flex:1,minWidth:75,background:"#C8AEFF18",border:"2px solid #C8AEFF",borderRadius:11,padding:"9px 7px",textAlign:"center"}}>
                              <div style={{fontSize:9,color:"#C8AEFF",letterSpacing:1,fontWeight:800,marginBottom:4}}>VALIDADO</div>
                              <div style={{fontSize:26,fontWeight:900,color:"#C8AEFF"}}>{row.validado}</div>
                            </div>
                          </>
                        )}
                      </div>
                      <div style={{display:"flex",gap:5,marginTop:9,flexWrap:"wrap"}}>
                        {eqIds.filter(id=>row.equipos[id]).map(id=>(
                          <React.Fragment key={id}>
                            <button style={{background:"#1E2A40",border:"2px solid #4A6FA8",color:"#A8C8FF",borderRadius:7,padding:"5px 10px",fontSize:10,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>openEdit(row,id)}>✏️ {equipos[id]?.nombre||id}</button>
                            <button style={{background:"#2A1515",border:"2px solid #FF5555",color:"#FF5555",borderRadius:7,padding:"5px 9px",fontSize:10,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setConfirmDel({fbId:row.equipos[id].fbId,eqId:id,ubicacion:row.ubicacion,sku:row.sku})}>🗑</button>
                          </React.Fragment>
                        ))}
                      </div>
                      {status==="discrepancia"&&row.validado===null&&(
                        <div style={{marginTop:10,background:"#200F0F",border:"2px solid #FF5555",borderRadius:11,padding:"11px"}}>
                          <p style={{color:"#FF5555",fontSize:13,fontWeight:800,marginBottom:8}}>⚠ Requiere 3er conteo:</p>
                          <div style={{display:"flex",gap:8}}>
                            <input style={{...S.inp,flex:1,textAlign:"center",fontSize:22,fontWeight:900}} type="number" inputMode="numeric" min="0" placeholder="?" value={terceros[key]??""} onChange={e=>setTerceros(t=>({...t,[key]:e.target.value}))}/>
                            <button style={{background:"#FF5555",border:"none",color:"#FFFFFF",borderRadius:9,padding:"0 16px",fontSize:14,fontWeight:900,cursor:"pointer",fontFamily:"inherit",minWidth:75}} onClick={()=>{if(terceros[key]!=null&&terceros[key]!=="")handleValidar(key,terceros[key]);}}>
                              {saving[key]?"...":"✓ OK"}
                            </button>
                          </div>
                        </div>
                      )}
                      {status==="ok"&&row.validado===null&&(
                        <button style={{marginTop:9,background:"#00E6A820",border:"2px solid #00E6A8",color:"#00E6A8",borderRadius:9,padding:"11px",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit",width:"100%"}}
                          onClick={()=>handleValidar(key,Object.values(row.equipos)[0]?.cantidad)}>
                          {saving[key]?"Guardando...":"✓ Confirmar cantidad"}
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </>
      )}
    </div>
  );
}

try{
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
}catch(e){
  console.error(e);
  document.getElementById("root").innerHTML='<div style="padding:40px;color:#FF5555;font-family:monospace;text-align:center"><p style="font-size:18px;font-weight:800">⚠ Error al cargar</p><p style="color:#aaa;margin-top:10px;font-size:13px">Abre F12 para ver el detalle</p><button onclick="location.reload()" style="margin-top:20px;padding:14px 28px;background:#C8AEFF;border:none;border-radius:10px;font-size:16px;cursor:pointer;font-weight:800">Reintentar</button></div>';
}
</script>
</body>
</html>
